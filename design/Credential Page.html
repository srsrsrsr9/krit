<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krit Credential · ML Engineering Foundations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
  :root {
    --bg: oklch(0.985 0.006 80);
    --ink: oklch(0.14 0.015 264);
    --ink-2: oklch(0.42 0.01 264);
    --ink-3: oklch(0.68 0.008 264);
    --indigo: oklch(0.52 0.22 264);
    --violet: oklch(0.52 0.22 290);
    --rule: oklch(0.88 0.008 264);
    --serif: 'Source Serif 4', Georgia, serif;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: var(--sans); line-height: 1.6; min-height: 100vh; }

  @keyframes seal-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes fade-up { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes check-draw { from { stroke-dashoffset: 60; } to { stroke-dashoffset: 0; } }
  @keyframes ring-grow { from { r: 0; opacity: 0; } to { r: 42; opacity: 1; } }

  .fade-up { animation: fade-up 0.55s ease forwards; opacity: 0; }
  .check-path { stroke-dasharray: 60; animation: check-draw 0.5s 0.6s ease forwards; stroke-dashoffset: 60; }

  .skill-bar-fill { transition: width 1s 0.4s ease; }

  .share-btn {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.6rem 1.25rem; border-radius: 6px; font-family: var(--sans);
    font-size: 0.875rem; font-weight: 500; cursor: pointer; border: 1.5px solid var(--rule);
    background: white; color: var(--ink-2); transition: all 0.18s;
  }
  .share-btn:hover { border-color: var(--indigo); color: var(--indigo); background: oklch(0.94 0.04 264); }

  .verify-badge {
    background: oklch(0.14 0.015 264); color: white; font-family: var(--sans);
    font-size: 0.75rem; font-weight: 500; padding: 0.35rem 0.875rem; border-radius: 100px;
    display: inline-flex; align-items: center; gap: 0.4rem; letter-spacing: 0.02em;
  }
  .code-mono {
    font-family: 'Courier New', monospace; font-size: 0.8125rem; letter-spacing: 0.12em;
    color: var(--ink); background: oklch(0.94 0.04 264); padding: 0.5rem 1rem;
    border-radius: 6px; border: 1px solid oklch(0.88 0.07 264);
  }

  /* OG Preview toggle */
  .og-preview {
    position: fixed; bottom: 24px; right: 24px; z-index: 50;
    background: white; border: 1px solid var(--rule); border-radius: 12px;
    box-shadow: 0 8px 32px oklch(0.14 0.015 264 / 0.12); overflow: hidden;
    width: 300px; transition: all 0.25s;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const T = {
  indigo: 'oklch(0.52 0.22 264)',
  violet: 'oklch(0.52 0.22 290)',
  ink: 'oklch(0.14 0.015 264)',
  ink2: 'oklch(0.42 0.01 264)',
  ink3: 'oklch(0.68 0.008 264)',
  bg: 'oklch(0.985 0.006 80)',
  rule: 'oklch(0.88 0.008 264)',
  indigoLight: 'oklch(0.94 0.04 264)',
};

const CREDENTIAL = {
  title: 'ML Engineering Foundations',
  learner: 'Priya Sharma',
  issuer: 'Krit',
  issueDate: 'April 22, 2026',
  expiryDate: 'April 22, 2028',
  code: 'KRT-7F2A-9B3C',
  skills: [
    { name: 'Python for ML', level: 3, maxLevel: 3, evidence: 14, description: 'Data structures, NumPy, Pandas, vectorisation' },
    { name: 'Statistics & Probability', level: 3, maxLevel: 3, evidence: 11, description: 'Distributions, hypothesis testing, Bayesian basics' },
    { name: 'Supervised Learning', level: 2, maxLevel: 3, evidence: 8, description: 'Regression, classification, model evaluation' },
    { name: 'Neural Networks', level: 2, maxLevel: 3, evidence: 6, description: 'Backprop, activations, training loops' },
    { name: 'Feature Engineering', level: 2, maxLevel: 3, evidence: 7, description: 'Encoding, scaling, selection, dimensionality reduction' },
    { name: 'Model Deployment', level: 1, maxLevel: 3, evidence: 3, description: 'FastAPI, containerisation, monitoring basics' },
  ],
};

const levelLabel = l => ['–', 'Familiar', 'Proficient', 'Mastered'][l] || '–';
const levelColor = l => {
  if (l === 0) return T.rule;
  if (l === 1) return 'oklch(0.75 0.14 264)';
  if (l === 2) return 'oklch(0.62 0.19 264)';
  return T.indigo;
};

/* ── Verification seal ── */
function Seal({ size = 80 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 80 80">
      <circle cx={40} cy={40} r={38} fill={T.indigo} />
      <circle cx={40} cy={40} r={34} fill="none" stroke="white" strokeWidth={1} opacity={0.3} />
      {/* tick marks around ring */}
      {Array.from({ length: 24 }, (_, i) => {
        const angle = (i / 24) * Math.PI * 2 - Math.PI/2;
        const r1 = 30, r2 = 34;
        return (
          <line key={i}
            x1={40 + Math.cos(angle)*r1} y1={40 + Math.sin(angle)*r1}
            x2={40 + Math.cos(angle)*r2} y2={40 + Math.sin(angle)*r2}
            stroke="white" strokeWidth={i % 6 === 0 ? 1.5 : 0.75} opacity={0.6}
          />
        );
      })}
      {/* check */}
      <polyline points="24,40 34,52 56,28" fill="none" stroke="white"
        strokeWidth={3.5} strokeLinecap="round" strokeLinejoin="round"
        className="check-path"
      />
    </svg>
  );
}

/* ── Skill evidence bar ── */
function SkillRow({ skill, index }) {
  const [visible, setVisible] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold: 0.4 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);

  const pct = (skill.level / skill.maxLevel) * 100;
  const c = levelColor(skill.level);

  return (
    <div ref={ref} style={{ padding: '1.25rem 0', borderBottom: `1px solid ${T.rule}` }}
      className="fade-up" style2={{ animationDelay: `${index * 0.08}s` }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.5rem' }}>
        <div>
          <span style={{ fontWeight: 500, fontSize: '0.9375rem', color: T.ink }}>{skill.name}</span>
          <span style={{ fontSize: '0.8125rem', color: T.ink3, marginLeft: '0.75rem' }}>{skill.description}</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', flexShrink: 0 }}>
          <span style={{ fontSize: '0.8125rem', color: T.ink3 }}>{skill.evidence} evidence items</span>
          <span style={{ fontSize: '0.75rem', fontWeight: 600, color: c, background: `${c}1a`,
            padding: '0.2rem 0.625rem', borderRadius: 100, border: `1px solid ${c}40` }}>
            {levelLabel(skill.level)}
          </span>
        </div>
      </div>
      <div style={{ height: 5, background: T.rule, borderRadius: 100, overflow: 'hidden' }}>
        <div style={{ height: '100%', background: c, borderRadius: 100,
          width: visible ? `${pct}%` : '0%', transition: 'width 0.9s ease' }} />
      </div>
      {/* evidence dots */}
      <div style={{ display: 'flex', gap: 4, marginTop: '0.5rem', flexWrap: 'wrap' }}>
        {Array.from({ length: skill.evidence }, (_, k) => (
          <div key={k} style={{ width: 7, height: 7, borderRadius: '50%', background: c,
            opacity: 0.6 + (k / skill.evidence) * 0.4,
            transform: visible ? 'scale(1)' : 'scale(0)',
            transition: `transform 0.25s ${0.4 + k * 0.04}s ease` }} />
        ))}
      </div>
    </div>
  );
}

/* ── OG Preview card ── */
function OGPreview({ visible, onClose }) {
  if (!visible) return null;
  return (
    <div className="og-preview">
      <div style={{ padding: '0.625rem 0.875rem', borderBottom: `1px solid ${T.rule}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontSize: '0.75rem', color: T.ink3, fontWeight: 500 }}>OG Preview · 1200×630</span>
        <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: T.ink3, fontSize: '1rem', lineHeight: 1 }}>×</button>
      </div>
      {/* Mini OG image */}
      <div style={{ background: T.ink, padding: '1.5rem', aspectRatio: '1200/630', display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: '0.5rem' }}>
        <div style={{ fontFamily: 'var(--sans)', fontSize: '0.55rem', color: 'oklch(0.52 0.22 264)', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: '0.25rem' }}>Krit · Verified Credential</div>
        <div style={{ fontFamily: 'var(--serif)', fontSize: '1.1rem', color: 'white', lineHeight: 1.2, fontWeight: 400 }}>ML Engineering<br/>Foundations</div>
        <div style={{ fontFamily: 'var(--sans)', fontSize: '0.6rem', color: 'oklch(0.68 0.008 264)' }}>Earned by Priya Sharma · April 2026</div>
        <div style={{ display: 'flex', gap: '0.35rem', marginTop: '0.25rem' }}>
          {[3,3,2,2,2,1].map((l,i) => <div key={i} style={{ width: 20, height: 4, borderRadius: 2, background: levelColor(l) }} />)}
        </div>
        <div style={{ marginTop: '0.5rem', display: 'flex', alignItems: 'center', gap: '0.4rem' }}>
          <div style={{ width: 14, height: 14, borderRadius: '50%', background: T.indigo, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ color: 'white', fontSize: '0.5rem' }}>✓</span>
          </div>
          <span style={{ fontFamily: 'var(--sans)', fontSize: '0.55rem', color: 'oklch(0.52 0.22 264)' }}>Cryptographically verified · {CREDENTIAL.code}</span>
        </div>
      </div>
    </div>
  );
}

/* ── Main page ── */
function CredentialPage() {
  const [copied, setCopied] = useState(false);
  const [showOG, setShowOG] = useState(false);

  const handleCopy = () => {
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  return (
    <div style={{ minHeight: '100vh' }}>
      {/* Top bar */}
      <div style={{ background: 'white', borderBottom: `1px solid ${T.rule}`, padding: '0 2rem', height: 56, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <a href="Landing Page.html" style={{ fontFamily: 'var(--serif)', fontSize: '1.1rem', fontWeight: 600, color: T.ink, textDecoration: 'none' }}>Krit</a>
        <div style={{ display: 'flex', gap: '0.75rem', alignItems: 'center' }}>
          <span style={{ fontSize: '0.8125rem', color: T.ink3 }}>Issued credential</span>
          <div className="verify-badge">
            <svg width={10} height={10} viewBox="0 0 10 10">
              <circle cx={5} cy={5} r={4.5} fill="none" stroke="white" strokeWidth={0.8}/>
              <polyline points="2.5,5 4,7 7.5,3" fill="none" stroke="white" strokeWidth={1} strokeLinecap="round"/>
            </svg>
            Verified
          </div>
        </div>
      </div>

      {/* Hero credential block */}
      <div style={{ background: T.ink, padding: '64px 2rem 80px' }}>
        <div style={{ maxWidth: 760, margin: '0 auto', textAlign: 'center' }}>
          <div style={{ marginBottom: '2rem' }} className="fade-up">
            <Seal size={80} />
          </div>
          <div className="fade-up" style={{ animationDelay: '0.1s' }}>
            <p style={{ fontFamily: 'var(--sans)', fontSize: '0.75rem', fontWeight: 500, color: 'oklch(0.52 0.22 264)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: '1.25rem' }}>
              Krit · Verified Credential
            </p>
          </div>
          <h1 className="fade-up" style={{ fontFamily: 'var(--serif)', fontWeight: 400, fontSize: 'clamp(2rem, 5vw, 3.25rem)', color: 'white', lineHeight: 1.15, letterSpacing: '-0.01em', marginBottom: '1.75rem', animationDelay: '0.18s' }}>
            {CREDENTIAL.title}
          </h1>
          <div className="fade-up" style={{ animationDelay: '0.28s' }}>
            <p style={{ fontFamily: 'var(--sans)', fontSize: '0.875rem', color: 'oklch(0.68 0.008 264)', marginBottom: '0.375rem' }}>Earned by</p>
            <p style={{ fontFamily: 'var(--serif)', fontSize: 'clamp(1.5rem, 3.5vw, 2.25rem)', fontWeight: 400, color: 'white', letterSpacing: '0.01em' }}>{CREDENTIAL.learner}</p>
          </div>
          <div className="fade-up" style={{ animationDelay: '0.36s', marginTop: '2.5rem', display: 'flex', justifyContent: 'center', gap: '3rem' }}>
            {[
              { label: 'Issued', value: CREDENTIAL.issueDate },
              { label: 'Expires', value: CREDENTIAL.expiryDate },
              { label: 'Skills verified', value: CREDENTIAL.skills.length },
            ].map(({ label, value }) => (
              <div key={label} style={{ textAlign: 'center' }}>
                <p style={{ fontSize: '0.75rem', color: 'oklch(0.45 0.01 264)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '0.25rem' }}>{label}</p>
                <p style={{ fontSize: '1rem', color: 'oklch(0.78 0.01 264)', fontWeight: 500 }}>{value}</p>
              </div>
            ))}
          </div>

          {/* Verification code */}
          <div className="fade-up" style={{ animationDelay: '0.44s', marginTop: '2.5rem', display: 'inline-flex', flexDirection: 'column', alignItems: 'center', gap: '0.5rem' }}>
            <p style={{ fontSize: '0.75rem', color: 'oklch(0.45 0.01 264)', letterSpacing: '0.06em', textTransform: 'uppercase' }}>Verification code</p>
            <span className="code-mono" style={{ background: 'oklch(0.20 0.015 264)', border: '1px solid oklch(0.28 0.02 264)', color: 'oklch(0.82 0.1 264)' }}>
              {CREDENTIAL.code}
            </span>
            <p style={{ fontSize: '0.75rem', color: 'oklch(0.42 0.01 264)' }}>Verify at krit.so/verify</p>
          </div>
        </div>
      </div>

      {/* Share strip */}
      <div style={{ background: 'white', borderBottom: `1px solid ${T.rule}`, padding: '1rem 2rem' }}>
        <div style={{ maxWidth: 760, margin: '0 auto', display: 'flex', alignItems: 'center', gap: '0.75rem', flexWrap: 'wrap' }}>
          <span style={{ fontSize: '0.8125rem', color: T.ink3, marginRight: '0.25rem' }}>Share</span>
          <button className="share-btn" onClick={() => window.open('https://linkedin.com', '_blank')}>
            <svg width={16} height={16} viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            LinkedIn
          </button>
          <button className="share-btn" onClick={() => window.open('https://x.com', '_blank')}>
            <svg width={15} height={15} viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.259 5.631zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            Post on X
          </button>
          <button className="share-btn" onClick={handleCopy}>
            {copied ? '✓ Copied' : '⌘ Copy link'}
          </button>
          <div style={{ marginLeft: 'auto' }}>
            <button className="share-btn" onClick={() => setShowOG(s => !s)} style={{ fontSize: '0.75rem', color: T.ink3 }}>
              OG preview
            </button>
          </div>
        </div>
      </div>

      {/* Evidence section */}
      <div style={{ maxWidth: 760, margin: '0 auto', padding: '3rem 2rem 6rem' }}>
        <div style={{ marginBottom: '2.5rem' }}>
          <h2 style={{ fontFamily: 'var(--serif)', fontWeight: 400, fontSize: '1.5rem', color: T.ink, marginBottom: '0.5rem' }}>
            Skill evidence
          </h2>
          <p style={{ fontSize: '0.9375rem', color: T.ink3, fontWeight: 300 }}>
            Each skill was assessed through reading comprehension logs, exercises, and applied work. Evidence is cryptographically linked.
          </p>
        </div>

        <div>
          {CREDENTIAL.skills.map((skill, i) => (
            <SkillRow key={skill.name} skill={skill} index={i} />
          ))}
        </div>

        {/* Issuer badge */}
        <div style={{ marginTop: '3rem', padding: '1.75rem', background: 'white', border: `1px solid ${T.rule}`, borderRadius: 12, display: 'flex', alignItems: 'center', gap: '1.25rem' }}>
          <Seal size={48} />
          <div style={{ flex: 1 }}>
            <p style={{ fontWeight: 500, color: T.ink, marginBottom: '0.25rem' }}>Issued by Krit</p>
            <p style={{ fontSize: '0.875rem', color: T.ink3, fontWeight: 300, lineHeight: 1.6 }}>
              Krit credentials are backed by verifiable evidence records. This credential was not handed out — it was earned through demonstrated mastery.
            </p>
          </div>
          <a href="Landing Page.html" style={{ fontSize: '0.8125rem', color: T.indigo, textDecoration: 'none', fontWeight: 500, whiteSpace: 'nowrap' }}>krit.so →</a>
        </div>

        {/* Verification prompt */}
        <div style={{ marginTop: '1.5rem', textAlign: 'center' }}>
          <p style={{ fontSize: '0.8125rem', color: T.ink3 }}>
            Verify this credential independently at{' '}
            <a href="#" style={{ color: T.indigo, textDecoration: 'none', fontWeight: 500 }}>krit.so/verify/{CREDENTIAL.code}</a>
          </p>
        </div>
      </div>

      <OGPreview visible={showOG} onClose={() => setShowOG(false)} />
    </div>
  );
}

/* ── Tweaks ── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "learnerName": "Priya Sharma",
  "credentialTitle": "ML Engineering Foundations",
  "accentHue": 264
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const t = tweaks || TWEAK_DEFAULTS;
  return (
    <>
      <CredentialPage />
      <window.TweaksPanel>
        <window.TweakSection label="Credential">
          <window.TweakText label="Learner name" id="learnerName" value={t.learnerName} onChange={v => setTweak('learnerName', v)} />
          <window.TweakText label="Title" id="credentialTitle" value={t.credentialTitle} onChange={v => setTweak('credentialTitle', v)} />
        </window.TweakSection>
        <window.TweakSection label="Brand">
          <window.TweakSlider label="Accent hue" id="accentHue" min={220} max={320} step={1} value={t.accentHue} onChange={v => setTweak('accentHue', v)} />
        </window.TweakSection>
      </window.TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
