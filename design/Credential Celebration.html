<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krit · Credential Celebration</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'DM Sans',sans-serif}
body{background:oklch(0.14 0.015 264);overflow:hidden}

@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes slide-up{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:none}}
@keyframes scale-in{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
@keyframes ev-scatter{0%{transform:translate(var(--tx),var(--ty)) scale(0.3);opacity:0}30%{opacity:1}100%{transform:translate(0,0) scale(1);opacity:1}}
@keyframes shimmer-sweep{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes card-rise{0%{opacity:0;transform:translateY(60px) scale(0.92)}100%{opacity:1;transform:none}}
@keyframes dot-orbit{from{transform:rotate(0deg) translateX(var(--r)) rotate(0deg)}to{transform:rotate(360deg) translateX(var(--r)) rotate(-360deg)}}
@keyframes ring-pulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.6);opacity:0}}
@keyframes check-draw{from{stroke-dashoffset:80}to{stroke-dashoffset:0}}
@keyframes badge-bounce{0%{transform:scale(0);opacity:0}60%{transform:scale(1.12)}80%{transform:scale(0.96)}100%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const T = {
  bg: 'oklch(0.14 0.015 264)',
  bgMid: 'oklch(0.18 0.015 264)',
  indigo: 'oklch(0.52 0.22 264)',
  indigoLight: 'oklch(0.66 0.22 264)',
  violet: 'oklch(0.52 0.22 292)',
  ink: 'oklch(0.14 0.015 264)',
  white: 'rgba(255,255,255,0.92)',
  dim: 'rgba(255,255,255,0.5)',
  rule: 'rgba(255,255,255,0.1)',
  gold: 'oklch(0.80 0.12 76)',
  goldLight: 'oklch(0.90 0.08 76)',
};

/* Evidence dot positions — deterministic ring */
const EV_SKILLS = [
  { label:'Python',     count:14, angle:0    },
  { label:'Statistics', count:11, angle:60   },
  { label:'SQL',        count:9,  angle:120  },
  { label:'ML Basics',  count:8,  angle:180  },
  { label:'Neural Nets',count:6,  angle:240  },
  { label:'Feature Eng',count:7,  angle:300  },
];

/* Tiny click sound via Web Audio */
function playClick() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    osc.start();
    osc.stop(ctx.currentTime + 0.12);
  } catch(e) {}
}

function EvidenceOrb({ skill, delay, visible, R }) {
  const RAD = skill.angle * Math.PI / 180;
  const cx = Math.cos(RAD) * R;
  const cy = Math.sin(RAD) * R;
  return (
    <div style={{
      position:'absolute', left:'50%', top:'50%',
      transform:`translate(${cx}px, ${cy}px) translate(-50%,-50%)`,
      transition:`opacity 0.4s ${delay}s`,
      opacity: visible ? 1 : 0,
    }}>
      <div style={{
        width:52, height:52, borderRadius:'50%',
        background:'rgba(255,255,255,0.05)',
        border:`1px solid ${T.rule}`,
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        backdropFilter:'blur(4px)',
      }}>
        <div style={{ fontSize:11, fontWeight:600, color:'rgba(255,255,255,0.6)', lineHeight:1 }}>{skill.count}</div>
        <div style={{ fontSize:8, color:'rgba(255,255,255,0.35)', marginTop:2, textAlign:'center', maxWidth:40, lineHeight:1.2 }}>{skill.label}</div>
      </div>
      {/* dots flowing inward */}
      {Array.from({length:Math.min(skill.count,5)},(_,k)=>{
        const dotAngle=(k/5)*Math.PI*2;
        const dotR=28;
        return(
          <div key={k} style={{
            position:'absolute', left:'50%', top:'50%',
            width:5, height:5, borderRadius:'50%',
            background:T.violet, marginLeft:-2.5, marginTop:-2.5,
            transform:`translate(${Math.cos(dotAngle)*dotR}px, ${Math.sin(dotAngle)*dotR}px)`,
            opacity: visible ? 0.65 : 0,
            transition:`opacity 0.3s ${delay+0.1}s`,
          }}/>
        );
      })}
    </div>
  );
}

function CredentialCard({ phase, muted, onToggleMute }) {
  const shimmerStyle = {
    background:`linear-gradient(105deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0) 70%)`,
    backgroundSize:'200% 100%',
    animation: phase>=3 ? 'shimmer-sweep 3s ease-in-out 0.5s infinite' : 'none',
  };
  return (
    <div style={{
      width: 380, borderRadius:16,
      background:`linear-gradient(135deg, oklch(0.22 0.04 264), oklch(0.18 0.02 264))`,
      border:`1px solid rgba(255,255,255,0.12)`,
      boxShadow:`0 0 0 1px rgba(255,255,255,0.05), 0 32px 80px rgba(0,0,0,0.6), 0 0 60px oklch(0.52 0.22 264 / 0.15)`,
      overflow:'hidden',
      animation: phase>=3 ? 'card-rise 0.8s cubic-bezier(0.22,1,0.36,1) forwards' : 'none',
      opacity: phase>=3 ? 1 : 0,
      position:'relative',
    }}>
      {/* Shimmer overlay */}
      <div style={{ position:'absolute', inset:0, ...shimmerStyle, pointerEvents:'none', zIndex:2, borderRadius:16 }}/>
      {/* Header */}
      <div style={{ padding:'1.5rem 1.75rem 1.25rem', borderBottom:'1px solid rgba(255,255,255,0.08)' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'1rem' }}>
          <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:'0.7rem', fontWeight:600, letterSpacing:'0.12em', textTransform:'uppercase', color:T.indigoLight }}>Krit · Verified Credential</span>
          <button onClick={onToggleMute} style={{ background:'none', border:'none', cursor:'pointer', color:'rgba(255,255,255,0.35)', fontSize:'0.75rem', display:'flex', alignItems:'center', gap:'0.3rem' }}>
            {muted ? '🔇' : '🔔'} {muted ? 'Sound off':'Sound on'}
          </button>
        </div>
        <h2 style={{ fontFamily:"'Source Serif 4',serif", fontWeight:400, fontSize:'1.625rem', color:'white', lineHeight:1.2, letterSpacing:'-0.01em' }}>ML Engineering<br/>Foundations</h2>
        <p style={{ fontSize:'0.875rem', color:'rgba(255,255,255,0.5)', marginTop:'0.5rem' }}>Earned by Priya Sharma</p>
      </div>
      {/* Seal */}
      <div style={{ padding:'1.75rem', display:'flex', alignItems:'center', gap:'1.25rem' }}>
        <div style={{ position:'relative', flexShrink:0 }}>
          {phase>=4 && <div style={{ position:'absolute', inset:-6, borderRadius:'50%', border:`2px solid ${T.gold}`, animation:'ring-pulse 1.5s ease-out forwards', opacity:0 }}/>}
          <svg width={72} height={72} viewBox="0 0 72 72">
            <circle cx={36} cy={36} r={34} fill={T.indigo}/>
            <circle cx={36} cy={36} r={30} fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth={1}/>
            {Array.from({length:24},(_,i)=>{
              const a=(i/24)*Math.PI*2-Math.PI/2;const r1=27,r2=31;
              return<line key={i} x1={36+Math.cos(a)*r1} y1={36+Math.sin(a)*r1} x2={36+Math.cos(a)*r2} y2={36+Math.sin(a)*r2} stroke="white" strokeWidth={i%6===0?1.5:0.75} opacity={0.6}/>;
            })}
            <polyline points="21,36 30,47 51,25" fill="none" stroke="white"
              strokeWidth={3.5} strokeLinecap="round" strokeLinejoin="round"
              strokeDasharray={80}
              style={{ strokeDashoffset: phase>=4?0:80, transition:'stroke-dashoffset 0.6s ease 0.2s' }}/>
          </svg>
        </div>
        <div>
          <div style={{ display:'flex', gap:'0.5rem', flexWrap:'wrap', marginBottom:'0.5rem' }}>
            {['Python','Stats','SQL','ML','Neural Nets','Features'].map((s,i)=>(
              <span key={i} style={{
                fontSize:'0.7rem', fontWeight:500, padding:'0.2rem 0.5rem', borderRadius:100,
                background:'rgba(255,255,255,0.07)', color:'rgba(255,255,255,0.6)',
                border:'1px solid rgba(255,255,255,0.1)',
              }}>{s}</span>
            ))}
          </div>
          <p style={{ fontSize:'0.8rem', color:'rgba(255,255,255,0.4)' }}>6 skills · 55 evidence items verified</p>
        </div>
      </div>
      {/* Footer */}
      <div style={{ padding:'1rem 1.75rem 1.5rem', display:'flex', justifyContent:'space-between', alignItems:'center', borderTop:'1px solid rgba(255,255,255,0.06)' }}>
        <div>
          <div style={{ fontSize:'0.7rem', color:'rgba(255,255,255,0.3)', letterSpacing:'0.06em', textTransform:'uppercase' }}>Issued</div>
          <div style={{ fontSize:'0.8125rem', color:'rgba(255,255,255,0.65)' }}>April 26, 2026</div>
        </div>
        <div style={{ fontFamily:"'DM Sans',monospace", fontSize:'0.75rem', letterSpacing:'0.1em', color:T.indigoLight, background:'rgba(255,255,255,0.05)', padding:'0.3rem 0.75rem', borderRadius:6 }}>KRT-7F2A-9B3C</div>
      </div>
    </div>
  );
}

function CelebrationScreen() {
  const [phase, setPhase] = useState(0);
  const [muted, setMuted] = useState(false);

  /* Phase timeline:
     0 — before
     1 — overlay fades in (t=0)
     2 — orbs appear (t=0.8)
     3 — card rises (t=2.0)
     4 — seal animates (t=3.0)
     5 — actions appear (t=3.8)
  */
  const advance = useRef(null);

  const startSequence = () => {
    setPhase(1);
    const timers = [
      setTimeout(()=>setPhase(2), 800),
      setTimeout(()=>{ setPhase(3); if(!muted) playClick(); }, 2000),
      setTimeout(()=>setPhase(4), 3000),
      setTimeout(()=>setPhase(5), 3800),
    ];
    return ()=>timers.forEach(clearTimeout);
  };

  const reset = () => { setPhase(0); };

  useEffect(()=>{
    if(phase===0){
      const t=setTimeout(startSequence, 600);
      return()=>clearTimeout(t);
    }
  },[phase]);

  if(phase===0) return(
    <div style={{ height:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:T.bg }}>
      <button onClick={startSequence} style={{ background:T.indigo, color:'white', border:'none', padding:'0.875rem 2rem', borderRadius:8, fontSize:'1rem', fontWeight:500, cursor:'pointer', fontFamily:"'DM Sans',sans-serif" }}>
        Preview celebration →
      </button>
    </div>
  );

  const R_orb = Math.min(window.innerWidth * 0.24, 220);

  return (
    <div style={{
      position:'fixed', inset:0, display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', zIndex:50,
      background: phase>=1 ? 'oklch(0.10 0.018 264)' : 'transparent',
      transition:'background 0.6s ease',
    }}>
      {/* Ambient glow */}
      <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width:600, height:600, borderRadius:'50%', background:`radial-gradient(circle, oklch(0.52 0.22 264 / 0.12) 0%, transparent 70%)`, pointerEvents:'none' }}/>

      {/* Top label */}
      <div style={{ position:'absolute', top:'2rem', left:0, right:0, textAlign:'center', animation: phase>=1?'fade-in 0.6s ease forwards':'none', opacity:0 }}>
        <span style={{ fontFamily:"'Source Serif 4',serif", fontSize:'1.125rem', fontWeight:400, color:'rgba(255,255,255,0.55)', letterSpacing:'0.01em' }}>You earned it.</span>
      </div>

      {/* Evidence orbs ring */}
      <div style={{ position:'relative', width:R_orb*2, height:R_orb*2, marginBottom:phase>=3?'-4rem':0, transition:'margin 0.6s ease' }}>
        {EV_SKILLS.map((skill,i)=>(
          <EvidenceOrb key={i} skill={skill} delay={i*0.08} visible={phase>=2} R={R_orb}/>
        ))}
        {/* Centre glow */}
        <div style={{
          position:'absolute', left:'50%', top:'50%', transform:'translate(-50%,-50%)',
          width:80, height:80, borderRadius:'50%',
          background: phase>=3 ? `radial-gradient(circle, oklch(0.52 0.22 264 / 0.4), transparent)` : 'transparent',
          transition:'background 0.8s ease',
        }}/>
      </div>

      {/* Credential card */}
      <div style={{ position:'relative', zIndex:10, marginTop:phase>=3?'-1rem':'2rem', transition:'margin 0.6s ease' }}>
        <CredentialCard phase={phase} muted={muted} onToggleMute={()=>setMuted(m=>!m)}/>
      </div>

      {/* Actions */}
      <div style={{
        marginTop:'2rem', display:'flex', gap:'1rem', flexWrap:'wrap', justifyContent:'center',
        opacity: phase>=5?1:0, transform: phase>=5?'translateY(0)':'translateY(16px)',
        transition:'opacity 0.5s ease, transform 0.5s ease',
      }}>
        <button style={{ background:T.indigo, color:'white', border:'none', padding:'0.75rem 1.5rem', borderRadius:8, fontSize:'0.9375rem', fontWeight:500, cursor:'pointer', fontFamily:"'DM Sans',sans-serif", display:'flex', alignItems:'center', gap:'0.5rem' }}>
          <svg width={16} height={16} viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          Share to LinkedIn
        </button>
        <a href="Credential Page.html" style={{ background:'rgba(255,255,255,0.07)', color:'rgba(255,255,255,0.85)', border:'1px solid rgba(255,255,255,0.15)', padding:'0.75rem 1.5rem', borderRadius:8, fontSize:'0.9375rem', fontWeight:500, cursor:'pointer', fontFamily:"'DM Sans',sans-serif", textDecoration:'none', display:'flex', alignItems:'center' }}>
          View credential →
        </a>
        <button onClick={reset} style={{ background:'transparent', color:'rgba(255,255,255,0.42)', border:'none', padding:'0.75rem 1rem', borderRadius:8, fontSize:'0.875rem', cursor:'pointer', fontFamily:"'DM Sans',sans-serif" }}>
          Continue learning
        </button>
      </div>

      {/* Restart */}
      {phase>=5&&<button onClick={reset} style={{ position:'absolute', bottom:'1.5rem', right:'1.5rem', background:'none', border:'none', color:'rgba(255,255,255,0.2)', cursor:'pointer', fontSize:'0.75rem', fontFamily:"'DM Sans',sans-serif" }}>replay</button>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CelebrationScreen/>);
</script>
</body>
</html>
