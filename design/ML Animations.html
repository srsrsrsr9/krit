<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krit · ML Concept Animations</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="animations.jsx"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%;background:#07080f}
  body{font-family:'DM Sans',sans-serif;overflow:hidden}
  .tab-bar{display:flex;gap:4px;padding:8px 16px;background:#0d0f1e;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;overflow-x:auto}
  .tab{padding:6px 16px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;white-space:nowrap;transition:all 0.18s}
  .tab.active{background:oklch(0.52 0.22 264);color:#fff}
  .tab:not(.active){background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.55)}
  .tab:not(.active):hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.85)}
  .stage-wrap{position:relative;flex:1;min-height:0}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;
const { useTime, Stage, Easing, animate, clamp, Sprite } = window;

/* ── Shared utils ─────────────────────────────────────── */
const lerp = (a,b,t) => a+(b-a)*t;
const c01  = (t) => Math.max(0,Math.min(1,t));
const ez   = (t) => Easing.easeInOutCubic(c01(t));
const fi   = (t,s,d=0.55) => ez((t-s)/d);            // fade-in scalar
const mv   = (t,s,d,a,b) => lerp(a,b,ez((t-s)/d));   // animated value

const C = {
  bg:'#0d0f1e', grid:'rgba(255,255,255,0.05)',
  text:'rgba(255,255,255,0.92)', dim:'rgba(255,255,255,0.42)', muted:'rgba(255,255,255,0.18)',
  indigo:'oklch(0.66 0.22 264)', violet:'oklch(0.66 0.22 292)',
  green:'oklch(0.72 0.18 145)', red:'oklch(0.68 0.22 22)',
  amber:'oklch(0.80 0.18 76)', teal:'oklch(0.70 0.17 195)',
  pink:'oklch(0.72 0.20 340)',
};

/* SVG text shorthand */
const Tx = ({x,y,children,size=14,fill=C.text,anchor='middle',weight=400,opacity=1,italic=false})=>(
  <text x={x} y={y} textAnchor={anchor} dominantBaseline="middle"
    fontSize={size} fill={fill} fontWeight={weight} opacity={opacity}
    fontFamily="'DM Sans',sans-serif" fontStyle={italic?'italic':'normal'}
    style={{userSelect:'none'}}>{children}</text>
);

/* Seeded RNG */
function rng(seed){let s=seed>>>0;return()=>{s=(s*1664525+1013904223)>>>0;return s/0xffffffff;};}

/* Thin grid lines */
function Grid({x1,x2,y1,y2,step=60}){
  const lines=[];
  for(let x=Math.ceil(x1/step)*step;x<=x2;x+=step)
    lines.push(<line key={'v'+x} x1={x} y1={y1} x2={x} y2={y2} stroke={C.grid} strokeWidth={1}/>);
  for(let y=Math.ceil(y1/step)*step;y<=y2;y+=step)
    lines.push(<line key={'h'+y} x1={x1} y1={y} x2={x2} y2={y} stroke={C.grid} strokeWidth={1}/>);
  return <g>{lines}</g>;
}

/* Arrow markers */
function Defs(){
  const mk=(id,col)=>(
    <marker id={id} markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill={col}/>
    </marker>
  );
  return(
    <defs>
      {mk('arr-a',C.amber)} {mk('arr-g',C.green)} {mk('arr-i',C.indigo)}
      {mk('arr-v',C.violet)} {mk('arr-r',C.red)} {mk('arr-w','rgba(255,255,255,0.6)')}
    </defs>
  );
}

/* ══════════════════════════════════════════════════════
   SCENE 1 — GRADIENT DESCENT
══════════════════════════════════════════════════════ */
function GradientDescent(){
  const t=useTime();
  const W=1280,H=680;
  // Parabola L(θ)=θ², canvas center at CX,CY
  const CX=370,CY=575,TS=105,LS=56;
  const sc=(th,l)=>[CX+th*TS, CY-l*LS];

  // θ steps: LR=0.35, ∇L=2θ → θ_new = θ(1-0.7)=0.3θ
  const thetas=[-2.7,-0.81,-0.243,-0.073,-0.022,-0.007,0];
  const losses=thetas.map(th=>th*th);
  const stepT=[2.0,3.2,4.4,5.4,6.2,6.9,7.5];
  const movDur=0.75;

  // Ball position
  let si=0;
  for(let i=0;i<stepT.length-1;i++) if(t>=stepT[i]) si=i;
  si=Math.min(si,thetas.length-2);
  const sp=c01((t-stepT[si])/movDur);
  const ballTh=lerp(thetas[si],thetas[Math.min(si+1,thetas.length-1)],Easing.easeInOutCubic(sp));
  const [bx,by]=sc(ballTh,ballTh*ballTh);

  // Arrow: shown in first 40% of each step
  const showArrow=sp<0.42&&t>stepT[0]+0.1&&si<thetas.length-2;
  const grad=2*thetas[si]; // ∇L
  const stepLen=-0.38*grad; // actual update
  const [ax,ay]=sc(thetas[si],losses[si]);
  const [ax2,ay2]=sc(thetas[si]+stepLen*0.85, losses[si]+(2*thetas[si])*(stepLen*0.85));

  // Parabola polyline
  const pts=Array.from({length:141},(_,i)=>{const th=-3.5+i*0.05;const[x,y]=sc(th,th*th);return`${x.toFixed(1)},${y.toFixed(1)}`;}).join(' ');

  // Right panel: loss chart
  const rL=790,rR=1220,rT=110,rB=555,rH=rB-rT,rW=rR-rL;
  const barX=i=>rL+45+i*(rW-60)/(thetas.length-1);
  const barH=l=>(l/7.5)*rH;
  const stepsVis=Math.min(thetas.length,si+1+(sp>0.6?1:0));

  return(
    <svg width={W} height={H}>
      <Defs/>
      <rect width={W} height={H} fill={C.bg}/>
      <Grid x1={60} x2={730} y1={50} y2={620}/>

      {/* Title */}
      <g opacity={fi(t,0,0.7)}>
        <Tx x={370} y={28} size={20} weight={600}>Gradient Descent</Tx>
        <Tx x={370} y={50} size={12} fill={C.dim}>Minimising L(θ) = θ² step by step</Tx>
      </g>

      {/* Axes */}
      <g opacity={fi(t,0.6,0.6)}>
        <line x1={80} y1={CY} x2={700} y2={CY} stroke="rgba(255,255,255,0.22)" strokeWidth={1.5}/>
        <line x1={CX} y1={620} x2={CX} y2={60} stroke="rgba(255,255,255,0.22)" strokeWidth={1.5}/>
        <Tx x={710} y={CY} size={13} fill={C.dim} anchor="start">θ</Tx>
        <Tx x={CX+8} y={72} size={13} fill={C.dim} anchor="start">L(θ)</Tx>
        {[-2,-1,0,1,2].map(v=>{
          const[x]=sc(v,0);
          return<g key={v}>
            <line x1={x} y1={CY-4} x2={x} y2={CY+4} stroke="rgba(255,255,255,0.2)" strokeWidth={1}/>
            <Tx x={x} y={CY+18} size={11} fill={C.dim}>{v}</Tx>
          </g>;
        })}
        {[1,2,4,6].map(l=>{
          const[,y]=sc(0,l);
          return<g key={l}>
            <line x1={CX-4} y1={y} x2={CX+4} y2={y} stroke="rgba(255,255,255,0.2)" strokeWidth={1}/>
            <Tx x={CX-14} y={y} size={11} fill={C.dim} anchor="end">{l}</Tx>
          </g>;
        })}
      </g>

      {/* Parabola */}
      <g opacity={fi(t,0.9,0.8)}>
        <polyline points={pts} fill="none" stroke={C.indigo} strokeWidth={2.5} strokeLinejoin="round"/>
        <Tx x={sc(2.9,8.41)[0]-10} y={sc(2.9,8.41)[1]-10} size={13} fill={C.indigo} anchor="end">L(θ) = θ²</Tx>
      </g>

      {/* Trail dots */}
      {thetas.slice(0,Math.min(si+1,thetas.length-1)).map((th,i)=>{
        const[x,y]=sc(th,th*th);
        return<circle key={i} cx={x} cy={y} r={5} fill={C.violet} opacity={0.65}/>;
      })}

      {/* Gradient arrow */}
      {showArrow&&(
        <g opacity={c01(sp/0.3)}>
          <line x1={ax} y1={ay} x2={ax2} y2={ay2} stroke={C.amber} strokeWidth={2.5} markerEnd="url(#arr-a)" strokeDasharray="5,3"/>
          <Tx x={(ax+ax2)/2+12} y={(ay+ay2)/2-20} size={11} fill={C.amber}>−α·∇L</Tx>
        </g>
      )}

      {/* Ball */}
      {t>1.8&&(
        <g opacity={fi(t,1.8,0.45)}>
          <circle cx={bx} cy={by} r={20} fill={C.amber} opacity={0.15}/>
          <circle cx={bx} cy={by} r={12} fill={C.amber}/>
          <circle cx={bx} cy={by} r={5} fill="white"/>
        </g>
      )}

      {/* Converged */}
      {t>7.8&&(
        <g opacity={fi(t,7.8,0.7)}>
          <rect x={bx-55} y={by-46} width={110} height={26} rx={6} fill={C.green} opacity={0.18}/>
          <Tx x={bx} y={by-33} size={13} fill={C.green} weight={600}>Converged ✓</Tx>
        </g>
      )}

      {/* Divider */}
      <line x1={755} y1={60} x2={755} y2={630} stroke="rgba(255,255,255,0.07)" strokeWidth={1}/>

      {/* Right panel */}
      <g opacity={fi(t,1.2,0.6)}>
        <Tx x={rL+rW/2} y={rT-28} size={13} fill={C.dim} weight={500}>Loss per iteration</Tx>
        <line x1={rL+30} y1={rB} x2={rR+10} y2={rB} stroke="rgba(255,255,255,0.18)" strokeWidth={1}/>
        <line x1={rL+30} y1={rT} x2={rL+30} y2={rB+5} stroke="rgba(255,255,255,0.18)" strokeWidth={1}/>
        <Tx x={rL+30} y={rB+18} size={11} fill={C.dim}>0</Tx>
        <Tx x={rR+16} y={rB} size={12} fill={C.dim} anchor="start">iter</Tx>
      </g>
      {Array.from({length:stepsVis},(_,i)=>{
        const bh=barH(losses[i]);
        const x=barX(i);
        const op=i<stepsVis-1?1:c01((t-stepT[i])/0.45);
        return(
          <g key={i} opacity={op}>
            <rect x={x-13} y={rB-bh} width={26} height={bh} fill={C.indigo} opacity={0.75} rx={3}/>
            <Tx x={x} y={rB-bh-14} size={10} fill={C.dim}>{losses[i].toFixed(2)}</Tx>
            <Tx x={x} y={rB+18} size={10} fill={C.dim}>{i}</Tx>
          </g>
        );
      })}

      {/* Formula box */}
      <g opacity={fi(t,2,0.8)}>
        <rect x={808} y={rB+30} width={390} height={56} rx={8} fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" strokeWidth={1}/>
        <Tx x={1003} y={rB+53} size={16} fill={C.amber} weight={500}>θ ← θ − α · ∇L(θ)</Tx>
        <Tx x={1003} y={rB+80} size={12} fill={C.dim}>α = 0.35 (learning rate) · ∇L(θ) = 2θ</Tx>
      </g>
    </svg>
  );
}

/* ══════════════════════════════════════════════════════
   SCENE 2 — TRANSFORMER ARCHITECTURE
══════════════════════════════════════════════════════ */
function TransformerArch(){
  const t=useTime();
  const W=1280,H=680;

  const tokens=['The','cat','sat'];
  const tokenColors=[C.indigo,C.violet,C.teal];
  const tokenX=[360,530,700];
  const tY=610;

  // Layer boxes (bottom-up)
  const layers=[
    {label:'Input Tokens',     y:580,h:44,  color:'rgba(255,255,255,0.06)',start:0.4},
    {label:'Token Embedding',  y:490,h:44,  color:'rgba(102,102,255,0.12)',start:1.2},
    {label:'+ Pos. Encoding',  y:422,h:36,  color:'rgba(80,200,120,0.12)', start:2.0},
    {label:'Multi-Head Attn',  y:318,h:60,  color:'rgba(102,102,255,0.15)',start:2.9},
    {label:'Add & Norm',       y:272,h:28,  color:'rgba(80,200,120,0.10)',start:3.5},
    {label:'Feed-Forward',     y:196,h:52,  color:'rgba(200,100,255,0.13)',start:4.2},
    {label:'Add & Norm',       y:150,h:28,  color:'rgba(80,200,120,0.10)',start:4.8},
    {label:'Linear + Softmax', y:80,h:44,   color:'rgba(255,160,80,0.15)', start:5.4},
  ];

  // Attention grid (3x3)
  const attnW=[[0.7,0.2,0.1],[0.1,0.8,0.1],[0.15,0.15,0.7]];
  const attnBoxX=860,attnBoxY=220,attnCell=54;

  // Particle flow
  const flowParticles=tokens.map((tok,i)=>{
    const x=tokenX[i];
    const pCycleT=2.0; // cycle period
    const delay=i*0.25;
    const frac=((t-1.8+delay)%pCycleT+pCycleT)%pCycleT/pCycleT;
    const y=lerp(580,120,Easing.easeInOutCubic(Math.min(frac*1.4,1)));
    return{x,y,color:tokenColors[i],frac};
  });

  const boxLeft=270,boxRight=780,boxCX=(boxLeft+boxRight)/2;

  return(
    <svg width={W} height={H}>
      <Defs/>
      <rect width={W} height={H} fill={C.bg}/>
      <Grid x1={240} x2={800} y1={50} y2={640} step={80}/>

      {/* Title */}
      <g opacity={fi(t,0,0.7)}>
        <Tx x={525} y={30} size={20} weight={600}>Transformer Architecture</Tx>
        <Tx x={525} y={52} size={12} fill={C.dim}>How attention-based models process sequences</Tx>
      </g>

      {/* Layer boxes */}
      {layers.map((l,i)=>(
        <g key={i} opacity={fi(t,l.start,0.5)}>
          <rect x={boxLeft} y={l.y} width={boxRight-boxLeft} height={l.h} rx={6} fill={l.color} stroke="rgba(255,255,255,0.1)" strokeWidth={1}/>
          <Tx x={boxCX} y={l.y+l.h/2} size={13} weight={500}>{l.label}</Tx>
        </g>
      ))}

      {/* Token labels at bottom */}
      {tokens.map((tok,i)=>(
        <g key={tok} opacity={fi(t,0.3,0.5)}>
          <rect x={tokenX[i]-30} y={tY-20} width={60} height={32} rx={6} fill={tokenColors[i]} opacity={0.25}/>
          <rect x={tokenX[i]-30} y={tY-20} width={60} height={32} rx={6} fill="none" stroke={tokenColors[i]} strokeWidth={1.5} opacity={0.6}/>
          <Tx x={tokenX[i]} y={tY-4} size={13} fill={tokenColors[i]} weight={600}>"{tok}"</Tx>
        </g>
      ))}

      {/* Flow particles */}
      {t>1.8&&flowParticles.map((p,i)=>(
        <g key={i}>
          <circle cx={p.x} cy={p.y} r={6} fill={p.color} opacity={0.8}/>
          <circle cx={p.x} cy={p.y} r={12} fill={p.color} opacity={0.15}/>
        </g>
      ))}

      {/* Vertical flow arrows on sides */}
      {[boxLeft-18,boxRight+18].map(x=>(
        <g key={x} opacity={fi(t,1,0.6)}>
          {[520,440,370,300,240,170].map(y=>(
            <line key={y} x1={x} y1={y+10} x2={x} y2={y-30} stroke="rgba(255,255,255,0.18)" strokeWidth={1} markerEnd="url(#arr-w)"/>
          ))}
        </g>
      ))}

      {/* Divider */}
      <line x1={820} y1={60} x2={820} y2={640} stroke="rgba(255,255,255,0.07)" strokeWidth={1}/>

      {/* RIGHT PANEL: Attention heatmap */}
      <g opacity={fi(t,3.2,0.8)}>
        <Tx x={attnBoxX+attnCell*1.5} y={200} size={13} fill={C.dim} weight={500}>Attention weights</Tx>
        {/* Column headers */}
        {tokens.map((tok,j)=><Tx key={j} x={attnBoxX+j*attnCell+attnCell/2} y={attnBoxY-18} size={11} fill={C.dim}>{tok}</Tx>)}
        {/* Row labels */}
        {tokens.map((tok,i)=><Tx key={i} x={attnBoxX-10} y={attnBoxY+i*attnCell+attnCell/2} size={11} fill={C.dim} anchor="end">{tok}</Tx>)}
        {/* Cells */}
        {attnW.map((row,i)=>row.map((w,j)=>{
          const cell_op=fi(t,3.4+(i*3+j)*0.06,0.4);
          return(
            <g key={`${i}-${j}`} opacity={cell_op}>
              <rect x={attnBoxX+j*attnCell} y={attnBoxY+i*attnCell} width={attnCell-3} height={attnCell-3} rx={4} fill={C.indigo} opacity={w*0.85}/>
              <Tx x={attnBoxX+j*attnCell+(attnCell-3)/2} y={attnBoxY+i*attnCell+(attnCell-3)/2} size={12} fill={w>0.5?'white':C.dim}>{w.toFixed(1)}</Tx>
            </g>
          );
        }))}
      </g>

      {/* Output distribution */}
      <g opacity={fi(t,5.8,0.8)}>
        <Tx x={1010} y={430} size={13} fill={C.dim} weight={500}>Next token P(x)</Tx>
        {[['on',0.42],['in',0.28],['by',0.14],['at',0.09],['…',0.07]].map(([tok,p],i)=>(
          <g key={tok}>
            <rect x={875} y={455+i*32} width={(p)*250} height={22} rx={4} fill={C.amber} opacity={0.7}/>
            <Tx x={870} y={466+i*32} size={12} fill={C.dim} anchor="end">{tok}</Tx>
            <Tx x={875+(p)*250+8} y={466+i*32} size={11} fill={C.dim} anchor="start">{(p*100).toFixed(0)}%</Tx>
          </g>
        ))}
      </g>

      {/* Key insight */}
      <g opacity={fi(t,2.5,0.7)}>
        <rect x={860} y={68} width={380} height={118} rx={8} fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.09)" strokeWidth={1}/>
        <Tx x={1050} y={92} size={12} fill={C.dim} weight={500}>Attention(Q,K,V)</Tx>
        <Tx x={1050} y={115} size={13} fill={C.amber} italic>= softmax(QKᵀ/√dₖ) · V</Tx>
        <Tx x={1050} y={142} size={11} fill={C.dim}>Q = queries  K = keys  V = values</Tx>
        <Tx x={1050} y={162} size={11} fill={C.dim}>dₖ = key dimension (scaling factor)</Tx>
      </g>
    </svg>
  );
}

/* ══════════════════════════════════════════════════════
   SCENE 3 — LINEAR REGRESSION
══════════════════════════════════════════════════════ */
function LinearRegression(){
  const t=useTime();
  const W=1280,H=680;

  // Coordinate space: x∈[-3,3], y∈[-2.5,2.5]
  const CX=400,CY=360,XS=95,YS=90;
  const toSVG=(x,y)=>[CX+x*XS, CY-y*YS];

  // Data: y = 0.65x + 0.3 + noise (seeded)
  const r=rng(42);
  const data=Array.from({length:20},()=>{
    const x=(r()-0.5)*5.2;
    const y=0.65*x+0.3+(r()-0.5)*0.9;
    return[x,y];
  });

  // OLS solution: w=0.65, b=0.3 (true params)
  const wTrue=0.65,bTrue=0.3;
  // Animated line: start wrong, converge to true
  const wAnim=mv(t,2.8,2.2,-0.4,wTrue);
  const bAnim=mv(t,2.8,2.2,1.1,bTrue);

  // Residuals appear after line settles
  const residualOp=fi(t,5.2,0.8);

  // Data points appear one by one
  const dotsVis=Math.min(data.length,Math.floor(Math.max(0,(t-0.8)/0.18)));

  // Line endpoints
  const [lx1,ly1]=toSVG(-3,wAnim*(-3)+bAnim);
  const [lx2,ly2]=toSVG(3,wAnim*3+bAnim);

  // R² grows after convergence
  const r2=0.748;
  const r2Anim=mv(t,5,1.2,0,r2);

  // Right panel: residual histogram
  const residuals=data.map(([x,y])=>y-(wTrue*x+bTrue));
  const rL=840,rR=1220,rCY=360,rS=65;

  return(
    <svg width={W} height={H}>
      <Defs/>
      <rect width={W} height={H} fill={C.bg}/>
      <Grid x1={60} x2={740} y1={50} y2={640}/>

      {/* Title */}
      <g opacity={fi(t,0,0.6)}>
        <Tx x={400} y={28} size={20} weight={600}>Linear Regression</Tx>
        <Tx x={400} y={50} size={12} fill={C.dim}>Fitting a line to data: y = wx + b</Tx>
      </g>

      {/* Axes */}
      <g opacity={fi(t,0.4,0.5)}>
        <line x1={75} y1={CY} x2={720} y2={CY} stroke="rgba(255,255,255,0.2)" strokeWidth={1.5}/>
        <line x1={CX} y1={625} x2={CX} y2={65} stroke="rgba(255,255,255,0.2)" strokeWidth={1.5}/>
        <Tx x={728} y={CY} size={13} fill={C.dim} anchor="start">x</Tx>
        <Tx x={CX+8} y={72} size={13} fill={C.dim} anchor="start">y</Tx>
        {[-2,-1,1,2].map(v=>{
          const[sx]=toSVG(v,0);const[,sy]=toSVG(0,v);
          return<g key={v}>
            <line x1={sx} y1={CY-4} x2={sx} y2={CY+4} stroke="rgba(255,255,255,0.18)" strokeWidth={1}/>
            <Tx x={sx} y={CY+18} size={11} fill={C.dim}>{v}</Tx>
            <line x1={CX-4} y1={sy} x2={CX+4} y2={sy} stroke="rgba(255,255,255,0.18)" strokeWidth={1}/>
            <Tx x={CX-14} y={sy} size={11} fill={C.dim} anchor="end">{v}</Tx>
          </g>;
        })}
      </g>

      {/* Data points */}
      {data.slice(0,dotsVis).map(([x,y],i)=>{
        const[sx,sy]=toSVG(x,y);
        return<circle key={i} cx={sx} cy={sy} r={6} fill={C.indigo} opacity={0.8}/>;
      })}

      {/* Residual lines */}
      {t>5&&data.map(([x,y],i)=>{
        const[sx,sy]=toSVG(x,y);
        const[,sy2]=toSVG(x,wTrue*x+bTrue);
        return<line key={i} x1={sx} y1={sy} x2={sx} y2={sy2} stroke={C.red} strokeWidth={1.5} opacity={residualOp*0.7} strokeDasharray="3,2"/>;
      })}

      {/* Regression line */}
      {t>2.5&&(
        <g opacity={fi(t,2.5,0.6)}>
          <line x1={lx1} y1={ly1} x2={lx2} y2={ly2} stroke={C.amber} strokeWidth={2.5}/>
        </g>
      )}

      {/* Equation */}
      <g opacity={fi(t,2.8,0.7)}>
        <rect x={470} y={80} width={230} height={68} rx={8} fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.09)" strokeWidth={1}/>
        <Tx x={585} y={104} size={14} fill={C.amber} weight={500}>ŷ = wx + b</Tx>
        <Tx x={585} y={126} size={12} fill={C.dim}>w = {wAnim.toFixed(2)}  b = {bAnim.toFixed(2)}</Tx>
        <Tx x={585} y={144} size={11} fill={C.green}>R² = {r2Anim.toFixed(3)}</Tx>
      </g>

      {/* Divider */}
      <line x1={760} y1={60} x2={760} y2={630} stroke="rgba(255,255,255,0.07)" strokeWidth={1}/>

      {/* Right: Loss curve */}
      <g opacity={fi(t,1.5,0.6)}>
        <Tx x={1030} y={90} size={13} fill={C.dim} weight={500}>MSE Loss (training)</Tx>
        <line x1={rL} y1={rCY+130} x2={rR+10} y2={rCY+130} stroke="rgba(255,255,255,0.18)" strokeWidth={1}/>
        <line x1={rL} y1={rCY-100} x2={rL} y2={rCY+135} stroke="rgba(255,255,255,0.18)" strokeWidth={1}/>
        <Tx x={rR+18} y={rCY+130} size={11} fill={C.dim} anchor="start">epoch</Tx>
        <Tx x={rL-5} y={rCY-100} size={11} fill={C.dim} anchor="end">MSE</Tx>
      </g>
      {t>1.5&&(()=>{
        const pts2=Array.from({length:60},(_,i)=>{
          const frac=i/59;
          const epoch=frac*12;
          const lossVal=2.1*Math.exp(-0.45*epoch)+0.15;
          const maxEpoch=Math.min(12,(t-1.5)*2.2);
          const x=rL+frac*(rR-rL);
          const y=rCY+130-lossVal*rS;
          return epoch<=maxEpoch?`${x.toFixed(1)},${y.toFixed(1)}`:null;
        }).filter(Boolean);
        return pts2.length>1?<polyline points={pts2.join(' ')} fill="none" stroke={C.green} strokeWidth={2.2}/>:null;
      })()}

      {/* Residual explanation */}
      <g opacity={fi(t,5.2,0.7)}>
        <rect x={840} y={455} width={360} height={100} rx={8} fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" strokeWidth={1}/>
        <Tx x={1020} y={478} size={13} fill={C.red}>Residual = y − ŷ</Tx>
        <Tx x={1020} y={500} size={12} fill={C.dim}>MSE = (1/n) Σ(yᵢ − ŷᵢ)²</Tx>
        <Tx x={1020} y={522} size={11} fill={C.dim}>We minimise this with gradient descent</Tx>
        <Tx x={1020} y={542} size={11} fill={C.dim}>to find optimal w and b</Tx>
      </g>

      {/* Best fit label */}
      {t>5&&<g opacity={fi(t,5,0.6)}><Tx x={660} y={290} size={12} fill={C.amber} anchor="start">Best fit line</Tx></g>}
    </svg>
  );
}

/* ══════════════════════════════════════════════════════
   SCENE 4 — LOGISTIC REGRESSION
══════════════════════════════════════════════════════ */
function LogisticRegression(){
  const t=useTime();
  const W=1280,H=680;

  // Left: 2D scatter plot
  const CX=380,CY=360,XS=90,YS=90;
  const toSVG=(x,y)=>[CX+x*XS, CY-y*YS];

  // Two classes
  const r0=rng(7), r1=rng(13);
  const class0=Array.from({length:16},()=>[r0()*2.4-3.3, (r0()-0.5)*1.6]);   // negative class (left)
  const class1=Array.from({length:16},()=>[r1()*2.4+0.9, (r1()-0.5)*1.6]);   // positive class (right)

  const sigmoid=z=>1/(1+Math.exp(-z));
  const w=1.8, b=-1.1; // decision boundary: 1.8x - 1.1 = 0 → x ≈ 0.61

  // Animate logistic curve
  const curveOp=fi(t,3.5,0.8);
  const boundOp=fi(t,4.3,0.7);
  const shadeOp=fi(t,4.8,0.8)*0.22;

  // Points visible
  const dots0=Math.min(class0.length,Math.floor(Math.max(0,(t-0.6)/0.15)));
  const dots1=Math.min(class1.length,Math.floor(Math.max(0,(t-0.6)/0.15)));

  // Right panel: sigmoid curve
  const rCX=1020,rCY=340,rXS=70,rYS=120;
  const toR=(z,p)=>[rCX+z*rXS, rCY-p*rYS];
  const sigPts=Array.from({length:81},(_,i)=>{const z=-4+i*0.1;const[rx,ry]=toR(z,sigmoid(z));return`${rx.toFixed(1)},${ry.toFixed(1)}`;}).join(' ');

  // Decision boundary x value: w*x + b = 0 → x = -b/w
  const boundX=-b/w; // ≈0.61
  const [bsvgX]=toSVG(boundX,0);

  // Shading for positive region
  const [shadeX]=toSVG(boundX,-3.5);

  return(
    <svg width={W} height={H}>
      <Defs/>
      <rect width={W} height={H} fill={C.bg}/>
      <Grid x1={60} x2={730} y1={50} y2={640}/>

      {/* Title */}
      <g opacity={fi(t,0,0.6)}>
        <Tx x={380} y={28} size={20} weight={600}>Logistic Regression</Tx>
        <Tx x={380} y={50} size={12} fill={C.dim}>Binary classification using a sigmoid decision boundary</Tx>
      </g>

      {/* Axes */}
      <g opacity={fi(t,0.4,0.5)}>
        <line x1={75} y1={CY} x2={720} y2={CY} stroke="rgba(255,255,255,0.2)" strokeWidth={1.5}/>
        <line x1={CX} y1={625} x2={CX} y2={65} stroke="rgba(255,255,255,0.2)" strokeWidth={1.5}/>
        <Tx x={728} y={CY} size={13} fill={C.dim} anchor="start">x</Tx>
        {[-3,-2,-1,1,2,3].map(v=>{
          const[sx]=toSVG(v,0);
          return<g key={v}>
            <line x1={sx} y1={CY-4} x2={sx} y2={CY+4} stroke="rgba(255,255,255,0.18)" strokeWidth={1}/>
            <Tx x={sx} y={CY+18} size={11} fill={C.dim}>{v}</Tx>
          </g>;
        })}
      </g>

      {/* Shading for positive prediction region */}
      {t>4.8&&<rect x={bsvgX} y={65} width={720-bsvgX} height={CY*2-65} fill={C.green} opacity={shadeOp}/>}

      {/* Class 0 dots (negative) */}
      {class0.slice(0,dots0).map(([x,y],i)=>{
        const[sx,sy]=toSVG(x,y);
        return<g key={i}><circle cx={sx} cy={sy} r={7} fill={C.red} opacity={0.8}/><circle cx={sx} cy={sy} r={7} fill="none" stroke={C.red} strokeWidth={1.5} opacity={0.4}/></g>;
      })}
      {/* Class 1 dots (positive) */}
      {class1.slice(0,dots1).map(([x,y],i)=>{
        const[sx,sy]=toSVG(x,y);
        return<g key={i}><circle cx={sx} cy={sy} r={7} fill={C.green} opacity={0.8}/></g>;
      })}

      {/* Decision boundary */}
      {t>4.3&&<line x1={bsvgX} y1={68} x2={bsvgX} y2={625} stroke={C.amber} strokeWidth={2.5} strokeDasharray="8,5" opacity={boundOp}/>}
      {t>4.6&&<g opacity={fi(t,4.6,0.5)}><Tx x={bsvgX+8} y={100} size={12} fill={C.amber} anchor="start">Decision boundary</Tx><Tx x={bsvgX+8} y={118} size={11} fill={C.dim} anchor="start">P(y=1) = 0.5</Tx></g>}

      {/* Legend */}
      <g opacity={fi(t,1.2,0.5)}>
        <circle cx={85} cy={88} r={7} fill={C.red} opacity={0.8}/><Tx x={100} y={88} size={12} fill={C.dim} anchor="start">Class 0 (negative)</Tx>
        <circle cx={85} cy={112} r={7} fill={C.green} opacity={0.8}/><Tx x={100} y={112} size={12} fill={C.dim} anchor="start">Class 1 (positive)</Tx>
      </g>

      {/* Formula */}
      <g opacity={fi(t,3,0.7)}>
        <rect x={440} y={75} width={260} height={68} rx={8} fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" strokeWidth={1}/>
        <Tx x={570} y={98} size={13} fill={C.amber} weight={500}>P(y=1) = σ(wx + b)</Tx>
        <Tx x={570} y={118} size={12} fill={C.dim}>σ(z) = 1 / (1 + e⁻ᶻ)</Tx>
        <Tx x={570} y={136} size={11} fill={C.dim}>w = 1.8  b = −1.1</Tx>
      </g>

      {/* Divider */}
      <line x1={760} y1={60} x2={760} y2={630} stroke="rgba(255,255,255,0.07)" strokeWidth={1}/>

      {/* Right: Sigmoid curve */}
      <g opacity={fi(t,2.8,0.6)}>
        <Tx x={rCX} y={110} size={13} fill={C.dim} weight={500}>Sigmoid function σ(z)</Tx>
        <line x1={800} y1={rCY} x2={1240} y2={rCY} stroke="rgba(255,255,255,0.18)" strokeWidth={1}/>
        <line x1={rCX} y1={rCY-rYS-30} x2={rCX} y2={rCY+rYS+30} stroke="rgba(255,255,255,0.18)" strokeWidth={1}/>
        <line x1={800} y1={rCY-rYS} x2={1240} y2={rCY-rYS} stroke="rgba(255,255,255,0.08)" strokeWidth={1} strokeDasharray="4,3"/>
        <Tx x={798} y={rCY-rYS} size={11} fill={C.dim} anchor="end">1</Tx>
        <Tx x={798} y={rCY} size={11} fill={C.dim} anchor="end">0.5</Tx>
        <Tx x={798} y={rCY+rYS} size={11} fill={C.dim} anchor="end">0</Tx>
        <line x1={800} y1={rCY+rYS} x2={1240} y2={rCY+rYS} stroke="rgba(255,255,255,0.08)" strokeWidth={1} strokeDasharray="4,3"/>
        <Tx x={1240} y={rCY+15} size={12} fill={C.dim} anchor="end">z</Tx>
      </g>
      <g opacity={curveOp}>
        <polyline points={sigPts} fill="none" stroke={C.violet} strokeWidth={2.5}/>
      </g>
      {/* Threshold line */}
      {t>4&&<g opacity={fi(t,4,0.6)}>
        <line x1={rCX} y1={rCY-rYS/2} x2={1240} y2={rCY-rYS/2} stroke={C.amber} strokeWidth={1.5} strokeDasharray="6,4"/>
        <Tx x={rCX+20} y={rCY-rYS/2-14} size={11} fill={C.amber} anchor="start">threshold = 0.5</Tx>
      </g>}

      {/* Loss function */}
      <g opacity={fi(t,5,0.7)}>
        <rect x={820} y={520} width={400} height={88} rx={8} fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" strokeWidth={1}/>
        <Tx x={1020} y={543} size={12} fill={C.dim} weight={500}>Binary Cross-Entropy Loss</Tx>
        <Tx x={1020} y={563} size={12} fill={C.amber} italic>L = −[y log(p) + (1−y) log(1−p)]</Tx>
        <Tx x={1020} y={584} size={11} fill={C.dim}>Penalises confident wrong predictions heavily</Tx>
        <Tx x={1020} y={601} size={11} fill={C.dim}>Minimised with gradient descent on w, b</Tx>
      </g>
    </svg>
  );
}

/* ══════════════════════════════════════════════════════
   SCENE 5 — 3 TYPES OF REGRESSION
══════════════════════════════════════════════════════ */
function ThreeRegressions(){
  const t=useTime();
  const W=1280,H=680;

  // Panel layout: 3 columns
  const panels=[
    {x:60,  cx:230, label:'Linear Regression', sublabel:'y = w₁x + b', color:C.green,  degree:1, start:0.5},
    {x:445, cx:615, label:'Polynomial Regression', sublabel:'y = w₁x + w₂x² + b', color:C.indigo,degree:3,start:1.2},
    {x:825, cx:1000,label:'Logistic Regression', sublabel:'P(y=1) = σ(wx + b)', color:C.violet,degree:'logistic',start:1.9},
  ];
  const pW=345,pTop=90,pBot=570,pCY=(pTop+pBot)/2,pH=pBot-pTop;
  const XS=65,YS=72;
  const toP=(px,cx,x,y)=>[cx+(x-0)*XS, pCY-y*YS];

  // Shared quadratic-ish data
  const r=rng(77);
  const contData=Array.from({length:18},()=>{
    const x=(r()-0.5)*4.4;
    const y=0.6*x+(r()-0.5)*1.1;
    return[x,y];
  });

  // Binary classification data for logistic
  const rb=rng(31);
  const binClass0=Array.from({length:12},()=>[(rb()*2-3.5),(rb()-0.5)*1.6]);
  const binClass1=Array.from({length:12},()=>[(rb()*2+1.5),(rb()-0.5)*1.6]);

  const sigmoid=z=>1/(1+Math.exp(-z));

  // Line fn per type
  const linY=x=>0.6*x+0.05;
  const polyY=x=>0.08*x*x*x-0.1*x*x+0.5*x+0.1;
  const logX0=-0.6/1.6;// boundary for logistic w=1.6, b=-0.6

  const dotsVis=Math.min(18,Math.floor(Math.max(0,(t-0.3)/0.14)));
  const binVis=Math.min(12,Math.floor(Math.max(0,(t-0.3)/0.14)));
  const lineOp=(i)=>fi(t,panels[i].start+0.8,0.7);

  return(
    <svg width={W} height={H}>
      <Defs/>
      <rect width={W} height={H} fill={C.bg}/>

      {/* Title */}
      <g opacity={fi(t,0,0.6)}>
        <Tx x={W/2} y={30} size={20} weight={600}>Three Types of Regression</Tx>
        <Tx x={W/2} y={52} size={12} fill={C.dim}>When to use which model — at a glance</Tx>
      </g>

      {panels.map((p,pi)=>{
        const cx=p.cx;
        const {x:pxStart,color,label,sublabel,degree,start}=p;

        // Grid for this panel
        const gridLines=[];
        for(let gx=pxStart+30;gx<pxStart+pW;gx+=60)
          gridLines.push(<line key={'v'+gx} x1={gx} y1={pTop} x2={gx} y2={pBot} stroke={C.grid} strokeWidth={1}/>);
        for(let gy=pTop+40;gy<pBot;gy+=60)
          gridLines.push(<line key={'h'+gy} x1={pxStart+10} y1={gy} x2={pxStart+pW-10} y2={gy} stroke={C.grid} strokeWidth={1}/>);

        return(
          <g key={pi} opacity={fi(t,start-0.3,0.5)}>
            {gridLines}
            {/* Panel border */}
            <rect x={pxStart+5} y={pTop-10} width={pW-10} height={pH+30} rx={8} fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)" strokeWidth={1}/>

            {/* Axes */}
            <line x1={pxStart+15} y1={pCY} x2={pxStart+pW-10} y2={pCY} stroke="rgba(255,255,255,0.18)" strokeWidth={1.5}/>
            <line x1={cx} y1={pBot-10} x2={cx} y2={pTop+5} stroke="rgba(255,255,255,0.18)" strokeWidth={1.5}/>

            {/* Title */}
            <Tx x={cx} y={pTop+18} size={14} fill={color} weight={600}>{label}</Tx>
            <Tx x={cx} y={pTop+38} size={11} fill={C.dim}>{sublabel}</Tx>

            {/* Data points + regression for linear and polynomial */}
            {(degree===1||degree===3)&&(
              <>
                {contData.slice(0,dotsVis).map(([x,y],i)=>{
                  const[sx,sy]=toP(pxStart,cx,x,y);
                  // Clip to panel
                  if(sx<pxStart+15||sx>pxStart+pW-10) return null;
                  if(sy<pTop||sy>pBot) return null;
                  return<circle key={i} cx={sx} cy={sy} r={5.5} fill={color} opacity={0.75}/>;
                })}
                <g opacity={lineOp(pi)}>
                  {(()=>{
                    const fn=degree===1?linY:polyY;
                    const pts2=Array.from({length:81},(_,i)=>{
                      const x=-2.8+i*0.07;
                      const[sx,sy]=toP(pxStart,cx,x,fn(x));
                      return`${sx.toFixed(1)},${sy.toFixed(1)}`;
                    }).join(' ');
                    return<polyline points={pts2} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round"/>;
                  })()}
                </g>
              </>
            )}

            {/* Logistic panel */}
            {degree==='logistic'&&(
              <>
                {binClass0.slice(0,binVis).map(([x,y],i)=>{
                  const[sx,sy]=toP(pxStart,cx,x,y);
                  if(sx<pxStart+15||sx>pxStart+pW-10) return null;
                  return<circle key={'n'+i} cx={sx} cy={sy} r={5.5} fill={C.red} opacity={0.75}/>;
                })}
                {binClass1.slice(0,binVis).map(([x,y],i)=>{
                  const[sx,sy]=toP(pxStart,cx,x,y);
                  if(sx<pxStart+pW-10&&sx>pxStart+15)
                    return<circle key={'p'+i} cx={sx} cy={sy} r={5.5} fill={C.green} opacity={0.75}/>;
                  return null;
                })}
                {/* Decision boundary */}
                <g opacity={lineOp(pi)}>
                  {(()=>{
                    const[bx]=toP(pxStart,cx,logX0,0);
                    return<>
                      <line x1={bx} y1={pTop+15} x2={bx} y2={pBot-10} stroke={color} strokeWidth={2} strokeDasharray="7,5"/>
                      <rect x={bx} y={pTop+15} width={pxStart+pW-10-bx} height={pBot-pTop-25} fill={C.green} opacity={0.06}/>
                    </>;
                  })()}
                </g>
              </>
            )}

            {/* Bottom label */}
            <g opacity={fi(t,start+1.2,0.6)}>
              <rect x={pxStart+15} y={pBot+12} width={pW-30} height={40} rx={6} fill="rgba(255,255,255,0.04)"/>
              {degree===1&&<Tx x={cx} y={pBot+26} size={11} fill={C.dim}>Continuous output · Linear relationship</Tx>}
              {degree===1&&<Tx x={cx} y={pBot+42} size={11} fill={C.dim}>Minimise MSE: (1/n) Σ(y − ŷ)²</Tx>}
              {degree===3&&<Tx x={cx} y={pBot+26} size={11} fill={C.dim}>Curved relationship · Higher-degree features</Tx>}
              {degree===3&&<Tx x={cx} y={pBot+42} size={11} fill={C.dim}>Beware overfitting with high degree</Tx>}
              {degree==='logistic'&&<Tx x={cx} y={pBot+26} size={11} fill={C.dim}>Binary output · Probability estimate</Tx>}
              {degree==='logistic'&&<Tx x={cx} y={pBot+42} size={11} fill={C.dim}>Minimise binary cross-entropy loss</Tx>}
            </g>
          </g>
        );
      })}

      {/* Dividers */}
      <line x1={430} y1={80} x2={430} y2={640} stroke="rgba(255,255,255,0.08)" strokeWidth={1}/>
      <line x1={815} y1={80} x2={815} y2={640} stroke="rgba(255,255,255,0.08)" strokeWidth={1}/>
    </svg>
  );
}

/* ══════════════════════════════════════════════════════
   APP
══════════════════════════════════════════════════════ */
const SCENES=[
  {id:'gd',  label:'Gradient Descent',       dur:12, Comp:GradientDescent},
  {id:'tf',  label:'Transformer Architecture',dur:14, Comp:TransformerArch},
  {id:'lr',  label:'Linear Regression',       dur:11, Comp:LinearRegression},
  {id:'log', label:'Logistic Regression',     dur:12, Comp:LogisticRegression},
  {id:'3r',  label:'3 Types of Regression',   dur:11, Comp:ThreeRegressions},
];

function App(){
  const [active,setActive]=useState('gd');
  const scene=SCENES.find(s=>s.id===active);

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      <div className="tab-bar">
        {SCENES.map(s=>(
          <button key={s.id} className={`tab${active===s.id?' active':''}`} onClick={()=>setActive(s.id)}>
            {s.label}
          </button>
        ))}
      </div>
      <div className="stage-wrap">
        {SCENES.map(s=>active===s.id&&(
          <div key={s.id} style={{position:'absolute',inset:0}}>
            <Stage width={1280} height={680} duration={s.dur} background={C.bg}
              persistKey={`krit-anim-${s.id}`} loop autoplay>
              <s.Comp/>
            </Stage>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
