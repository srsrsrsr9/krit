<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krit · Before vs After</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:oklch(0.985 0.006 80);font-family:'DM Sans',sans-serif;color:oklch(0.14 0.015 264)}
  @keyframes slide-down{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:none}}
  @keyframes fade-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  @keyframes bloom{from{opacity:0;transform:scale(0.6)}to{opacity:1;transform:scale(1)}}
  @keyframes counter-tick{from{content:'0'}}
  .lms-card{background:white;border:1px solid oklch(0.9 0.005 264);border-radius:8px;padding:1rem 1.25rem;display:flex;align-items:center;gap:0.875rem;transition:all 0.3s}
  .krit-node{transition:all 0.6s cubic-bezier(0.22,1,0.36,1)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const T = {
  bg: 'oklch(0.985 0.006 80)',
  ink: 'oklch(0.14 0.015 264)',
  ink2: 'oklch(0.42 0.01 264)',
  ink3: 'oklch(0.68 0.008 264)',
  rule: 'oklch(0.88 0.008 264)',
  indigo: 'oklch(0.52 0.22 264)',
  violet: 'oklch(0.52 0.22 292)',
  indigoLight: 'oklch(0.94 0.04 264)',
  red: 'oklch(0.56 0.18 22)',
  green: 'oklch(0.54 0.16 145)',
};

function useInView(threshold=0.2) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(()=>{
    const el = ref.current; if(!el) return;
    const obs = new IntersectionObserver(([e])=>{ if(e.isIntersecting) setInView(true); },{threshold});
    obs.observe(el);
    return()=>obs.disconnect();
  },[threshold]);
  return [ref, inView];
}

function useScrollProgress(ref) {
  const [progress, setProgress] = useState(0);
  useEffect(()=>{
    const el = ref.current; if(!el) return;
    const onScroll = () => {
      const rect = el.getBoundingClientRect();
      const wH = window.innerHeight;
      const p = Math.max(0, Math.min(1, 1 - rect.top/wH));
      setProgress(p);
    };
    window.addEventListener('scroll', onScroll, { passive:true });
    onScroll();
    return()=>window.removeEventListener('scroll', onScroll);
  },[]);
  return progress;
}

/* ── LMS Courses panel ── */
const LMS_COURSES = [
  { title:'Introduction to Data Science', progress:100, status:'done' },
  { title:'Python Fundamentals',          progress:100, status:'done' },
  { title:'SQL for Beginners',            progress:47,  status:'stalled' },
  { title:'Machine Learning Basics',      progress:12,  status:'stalled' },
  { title:'Statistics 101',               progress:3,   status:'new' },
  { title:'Deep Learning Foundations',    progress:0,   status:'new' },
  { title:'Data Visualisation',           progress:0,   status:'new' },
  { title:'Natural Language Processing',  progress:0,   status:'new' },
  { title:'Feature Engineering',          progress:0,   status:'new' },
  { title:'Model Deployment',             progress:0,   status:'new' },
  { title:'MLOps Fundamentals',           progress:0,   status:'new' },
  { title:'Advanced SQL Patterns',        progress:0,   status:'new' },
];

function LMSPanel({ progress }) {
  const visibleCount = Math.floor(2 + progress * 10);
  const courses = LMS_COURSES.slice(0, Math.min(visibleCount, LMS_COURSES.length));
  const started = courses.filter(c=>c.status==='done').length;
  const completed = 2;

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:'0.75rem', height:'100%' }}>
      {/* Stats */}
      <div style={{ display:'flex', gap:'1.5rem', padding:'0.875rem 1rem', background:'white', border:`1px solid ${T.rule}`, borderRadius:8, opacity: progress>0.1?1:0, transition:'opacity 0.4s' }}>
        <div>
          <div style={{ fontSize:'1.5rem', fontWeight:600, color:T.ink, lineHeight:1 }}>{Math.floor(courses.length)}</div>
          <div style={{ fontSize:'0.75rem', color:T.ink3 }}>courses started</div>
        </div>
        <div style={{ width:1, background:T.rule }}/>
        <div>
          <div style={{ fontSize:'1.5rem', fontWeight:600, color:T.red, lineHeight:1 }}>{completed}</div>
          <div style={{ fontSize:'0.75rem', color:T.ink3 }}>completed</div>
        </div>
        <div style={{ marginLeft:'auto', alignSelf:'center', fontSize:'0.8125rem', color:T.ink3 }}>
          {Math.round((completed/Math.max(1,courses.length))*100)}% completion rate
        </div>
      </div>
      {/* Course list */}
      <div style={{ flex:1, overflowY:'hidden', display:'flex', flexDirection:'column', gap:'0.5rem' }}>
        {courses.map((c,i)=>(
          <div key={i} className="lms-card"
            style={{ animation: i===courses.length-1&&progress<0.9?`slide-down 0.35s ease forwards`:'' }}>
            <div style={{ width:32, height:32, borderRadius:'50%', background:c.status==='done'?T.green:c.status==='stalled'?'oklch(0.90 0.08 76)':T.rule, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <span style={{ fontSize:14 }}>{c.status==='done'?'✓':c.status==='stalled'?'…':'○'}</span>
            </div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:'0.875rem', fontWeight:500, color:c.status==='new'?T.ink3:T.ink, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{c.title}</div>
              <div style={{ height:4, background:T.rule, borderRadius:2, marginTop:'0.375rem', overflow:'hidden' }}>
                <div style={{ height:'100%', width:`${c.progress}%`, background:c.status==='done'?T.green:c.status==='stalled'?'oklch(0.72 0.18 76)':T.indigo, borderRadius:2, transition:'width 0.6s ease' }}/>
              </div>
            </div>
            <span style={{ fontSize:'0.75rem', color:T.ink3, flexShrink:0 }}>{c.progress}%</span>
          </div>
        ))}
        {progress > 0.6 && (
          <div style={{ textAlign:'center', padding:'0.75rem', fontSize:'0.8125rem', color:T.ink3, fontStyle:'italic' }}>
            +{LMS_COURSES.length - courses.length} more courses…
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Krit Skill Graph panel ── */
const KRIT_NODES = [
  { id:'sql',   x:0.18, y:0.45, label:'SQL',        mastered:true,  ev:9  },
  { id:'py',    x:0.40, y:0.22, label:'Python',     mastered:true,  ev:14 },
  { id:'stats', x:0.40, y:0.68, label:'Statistics', mastered:true,  ev:11 },
  { id:'ml',    x:0.62, y:0.45, label:'ML Basics',  mastered:true,  ev:8  },
  { id:'reg',   x:0.82, y:0.68, label:'Regression', mastered:false, ev:3  },
  { id:'nlp',   x:0.82, y:0.22, label:'NLP',        mastered:false, ev:1  },
];
const KRIT_EDGES=[['sql','py'],['sql','stats'],['py','ml'],['stats','ml'],['ml','nlp'],['ml','reg']];

function KritPanel({ progress }) {
  const lc = (n) => n.mastered ? T.indigo : (n.ev>0?'oklch(0.72 0.12 264)':T.rule);
  const showCred = progress > 0.7;
  const showEv = progress > 0.3;

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:'0.75rem', height:'100%' }}>
      {/* Stats */}
      <div style={{ display:'flex', gap:'1.5rem', padding:'0.875rem 1rem', background:'white', border:`1px solid ${T.rule}`, borderRadius:8, opacity: progress>0.1?1:0, transition:'opacity 0.4s' }}>
        <div>
          <div style={{ fontSize:'1.5rem', fontWeight:600, color:T.indigo, lineHeight:1 }}>12</div>
          <div style={{ fontSize:'0.75rem', color:T.ink3 }}>skills mapped</div>
        </div>
        <div style={{ width:1, background:T.rule }}/>
        <div>
          <div style={{ fontSize:'1.5rem', fontWeight:600, color:T.green, lineHeight:1 }}>4</div>
          <div style={{ fontSize:'0.75rem', color:T.ink3 }}>mastered</div>
        </div>
        <div style={{ marginLeft:'auto', alignSelf:'center', fontSize:'0.8125rem', color:T.ink3 }}>
          1 credential earned
        </div>
      </div>
      {/* Graph */}
      <div style={{ flex:1, background:'white', border:`1px solid ${T.rule}`, borderRadius:12, padding:'1rem', position:'relative', overflow:'hidden' }}>
        <svg viewBox="0 0 400 280" width="100%" height="100%" style={{ overflow:'visible' }}>
          {KRIT_EDGES.map(([a,b],i)=>{
            const na=KRIT_NODES.find(n=>n.id===a),nb=KRIT_NODES.find(n=>n.id===b);
            const vis=progress>0.2+i*0.04;
            return<line key={i} x1={na.x*400} y1={na.y*280} x2={nb.x*400} y2={nb.y*280}
              stroke={na.mastered&&nb.mastered?T.indigo:T.rule} strokeWidth={na.mastered&&nb.mastered?2:1.5}
              opacity={vis?0.6:0} style={{transition:`opacity 0.6s ${i*0.08}s`}}/>;
          })}
          {KRIT_NODES.map((n,i)=>{
            const vis=progress>0.15+i*0.06;
            const cx=n.x*400,cy=n.y*280;
            const scale=vis?1:0;
            const evDots=showEv?n.ev:0;
            return(
              <g key={n.id} style={{ transformOrigin:`${cx}px ${cy}px`, transform:`scale(${scale})`, transition:`transform 0.5s cubic-bezier(0.22,1,0.36,1) ${i*0.1}s, opacity 0.4s ${i*0.1}s`, opacity:vis?1:0, filter:n.mastered&&progress>0.5?`drop-shadow(0 0 6px oklch(0.52 0.22 264 / 0.5))`:'none' }}>
                <circle cx={cx} cy={cy} r={26} fill={lc(n)} opacity={n.mastered?1:0.5+n.ev/10*0.4}/>
                <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle" fontSize={9} fontWeight={600} fill={n.mastered?'white':n.ev>0?T.ink:'oklch(0.6 0.01 264)'} fontFamily="'DM Sans',sans-serif">{n.label}</text>
                {showEv&&Array.from({length:Math.min(evDots,6)},(_,k)=>{
                  const angle=(k/Math.min(evDots,6))*Math.PI*2-Math.PI/2;
                  return<circle key={k} cx={cx+Math.cos(angle)*36} cy={cy+Math.sin(angle)*36} r={3.5} fill={T.violet} opacity={0.75} style={{transition:`opacity 0.4s ${0.3+k*0.05}s`}}/>;
                })}
              </g>
            );
          })}
        </svg>
        {/* Credential badge */}
        {showCred && (
          <div style={{ position:'absolute', bottom:'1rem', right:'1rem', background:T.indigo, color:'white', borderRadius:8, padding:'0.5rem 0.875rem', fontSize:'0.75rem', fontWeight:600, animation:'bloom 0.5s cubic-bezier(0.22,1,0.36,1) forwards', display:'flex', alignItems:'center', gap:'0.4rem' }}>
            <svg width={14} height={14} viewBox="0 0 14 14"><circle cx={7} cy={7} r={6.5} fill="none" stroke="white" strokeWidth={1}/><polyline points="3,7 5.5,10 11,4.5" fill="none" stroke="white" strokeWidth={1.5} strokeLinecap="round"/></svg>
            ML Foundations · Verified
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Main section ── */
function BeforeAfterSection() {
  const sectionRef = useRef(null);
  const [sectionRef2, inView] = useInView(0.1);
  const scrollP = useScrollProgress(sectionRef);

  const combinedRef = (el) => {
    sectionRef.current = el;
    sectionRef2.current = el;
  };

  // Clamp progress to 0..1 usefully: full effect at ~60% scroll through section
  const p = Math.max(0, Math.min(1, (scrollP - 0.1) / 0.65));

  return (
    <div>
      {/* Spacer intro */}
      <div style={{ height:'40vh', display:'flex', alignItems:'center', justifyContent:'center', textAlign:'center', padding:'2rem' }}>
        <div>
          <h2 style={{ fontFamily:"'Source Serif 4',serif", fontWeight:400, fontSize:'clamp(1.75rem,3.5vw,2.75rem)', color:T.ink, lineHeight:1.2, marginBottom:'1rem' }}>
            The problem with courses<br/>is that they never end.
          </h2>
          <p style={{ fontSize:'1.0625rem', color:T.ink2, fontWeight:300, maxWidth:480, margin:'0 auto' }}>
            Scroll to see the difference.
          </p>
        </div>
      </div>

      {/* Sticky comparison */}
      <div ref={combinedRef} style={{ minHeight:'300vh', position:'relative' }}>
        <div style={{ position:'sticky', top:0, height:'100vh', display:'flex', flexDirection:'column', justifyContent:'center', padding:'2rem', overflow:'hidden' }}>
          <div style={{ maxWidth:1200, margin:'0 auto', width:'100%' }}>
            {/* Header */}
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'3rem', marginBottom:'1.5rem' }}>
              <div>
                <div style={{ fontSize:'0.75rem', fontWeight:600, color:T.red, textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:'0.375rem' }}>The LMS way</div>
                <h3 style={{ fontFamily:"'Source Serif 4',serif", fontWeight:400, fontSize:'1.375rem', color:T.ink, lineHeight:1.25 }}>Course after course,<br/>forever.</h3>
              </div>
              <div>
                <div style={{ fontSize:'0.75rem', fontWeight:600, color:T.indigo, textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:'0.375rem' }}>The Krit way</div>
                <h3 style={{ fontFamily:"'Source Serif 4',serif", fontWeight:400, fontSize:'1.375rem', color:T.ink, lineHeight:1.25 }}>Precise skills,<br/>real proof.</h3>
              </div>
            </div>

            {/* Panels */}
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'3rem', height:'60vh', minHeight:400, maxHeight:580 }}>
              <div style={{ padding:'1.25rem', background:`oklch(0.97 0.004 264)`, borderRadius:12, border:`1px solid ${T.rule}`, overflow:'hidden', position:'relative' }}>
                <div style={{ position:'absolute', inset:0, background:`linear-gradient(to bottom, transparent 60%, oklch(0.97 0.004 264) 100%)`, zIndex:2, pointerEvents:'none' }}/>
                <LMSPanel progress={p}/>
              </div>
              <div style={{ padding:'1.25rem', background:`white`, borderRadius:12, border:`1px solid oklch(0.88 0.07 264)`, boxShadow:`0 0 0 1px oklch(0.88 0.07 264 / 0.3), 0 8px 32px oklch(0.52 0.22 264 / 0.06)`, overflow:'hidden' }}>
                <KritPanel progress={p}/>
              </div>
            </div>

            {/* Caption */}
            <div style={{ marginTop:'1.5rem', textAlign:'center', opacity: p>0.5?1:0, transition:'opacity 0.5s' }}>
              <p style={{ fontSize:'0.9375rem', color:T.ink2, fontWeight:300 }}>
                Same learner. Same time investment. Completely different outcome.
              </p>
            </div>
          </div>
        </div>
      </div>

      {/* Buffer after */}
      <div style={{ height:'30vh' }}/>
    </div>
  );
}

function App() {
  return (
    <div style={{ background:T.bg }}>
      {/* Nav placeholder */}
      <div style={{ position:'fixed', top:0, left:0, right:0, height:56, background:'rgba(255,255,255,0.9)', backdropFilter:'blur(12px)', borderBottom:`1px solid ${T.rule}`, display:'flex', alignItems:'center', padding:'0 2rem', zIndex:100 }}>
        <span style={{ fontFamily:"'Source Serif 4',serif", fontSize:'1.25rem', fontWeight:600, color:T.ink }}>Krit</span>
      </div>
      <div style={{ paddingTop:56 }}>
        <BeforeAfterSection/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
