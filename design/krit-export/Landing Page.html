<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krit — Skill-first learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
  :root {
    --bg: oklch(0.985 0.006 80);
    --ink: oklch(0.14 0.015 264);
    --ink-2: oklch(0.42 0.01 264);
    --ink-3: oklch(0.68 0.008 264);
    --indigo: oklch(0.52 0.22 264);
    --violet: oklch(0.52 0.22 290);
    --indigo-light: oklch(0.94 0.04 264);
    --indigo-mid: oklch(0.88 0.07 264);
    --rule: oklch(0.88 0.008 264);
    --serif: 'Source Serif 4', Georgia, serif;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--ink); font-family: var(--sans); line-height: 1.6; }
  .serif { font-family: var(--serif); }
  .rule { border-color: var(--rule); }

  /* Skill graph animation */
  @keyframes pulse-dot { 0%,100%{opacity:.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.3)} }
  @keyframes draw-edge { from{stroke-dashoffset:200} to{stroke-dashoffset:0} }
  @keyframes float-in { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes evidence-pop { 0%{opacity:0;transform:scale(0)} 60%{transform:scale(1.2)} 100%{opacity:1;transform:scale(1)} }
  @keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }

  .edge-anim { stroke-dasharray: 200; animation: draw-edge 1.2s ease forwards; }
  .node-anim { animation: float-in 0.5s ease forwards; opacity: 0; }
  .ev-dot { animation: evidence-pop 0.35s ease forwards; opacity: 0; }

  /* Scroll reveal */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.65s ease, transform 0.65s ease; }
  .reveal.visible { opacity: 1; transform: none; }

  /* Nav */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: oklch(0.985 0.006 80 / 0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--rule); }

  /* Buttons */
  .btn-primary {
    background: var(--indigo); color: #fff; font-family: var(--sans); font-weight: 500;
    padding: 0.75rem 1.75rem; border-radius: 6px; border: none; cursor: pointer;
    font-size: 0.9375rem; letter-spacing: 0.01em; transition: background 0.18s, transform 0.12s;
  }
  .btn-primary:hover { background: var(--violet); transform: translateY(-1px); }
  .btn-ghost {
    background: transparent; color: var(--indigo); font-family: var(--sans); font-weight: 500;
    padding: 0.75rem 1.75rem; border-radius: 6px; border: 1.5px solid var(--indigo-mid);
    cursor: pointer; font-size: 0.9375rem; letter-spacing: 0.01em; transition: all 0.18s;
  }
  .btn-ghost:hover { border-color: var(--indigo); background: var(--indigo-light); }

  /* Feature card */
  .feature-card {
    background: #fff; border: 1px solid var(--rule); border-radius: 12px;
    padding: 2.5rem; transition: box-shadow 0.25s;
  }
  .feature-card:hover { box-shadow: 0 8px 32px oklch(0.52 0.22 264 / 0.08); }

  /* Step */
  .step-num {
    font-family: var(--serif); font-size: 2.5rem; color: var(--indigo); opacity: 0.25; line-height: 1;
  }

  /* Pricing */
  .pricing-card { border: 1px solid var(--rule); border-radius: 12px; padding: 2.5rem; background: #fff; }
  .pricing-card.featured { border-color: var(--indigo); box-shadow: 0 0 0 3px oklch(0.52 0.22 264 / 0.10); }

  /* Logo placeholder */
  .logo-ph {
    height: 36px; background: var(--rule); border-radius: 4px;
    background: linear-gradient(90deg, var(--rule) 25%, oklch(0.92 0.006 264) 50%, var(--rule) 75%);
    background-size: 200% 100%; animation: shimmer 2s infinite;
  }

  /* Badge chip */
  .chip {
    display: inline-block; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 0.25rem 0.75rem; border-radius: 100px;
    border: 1px solid var(--indigo-mid); color: var(--indigo); background: var(--indigo-light);
  }
</style>
</head>
<body>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Brand tokens ── */
const T = {
  indigo: 'oklch(0.52 0.22 264)',
  violet: 'oklch(0.52 0.22 290)',
  ink: 'oklch(0.14 0.015 264)',
  ink2: 'oklch(0.42 0.01 264)',
  ink3: 'oklch(0.68 0.008 264)',
  bg: 'oklch(0.985 0.006 80)',
  rule: 'oklch(0.88 0.008 264)',
  indigoLight: 'oklch(0.94 0.04 264)',
};

/* ── Skill Graph SVG ── */
function SkillGraph({ animated = true }) {
  const nodes = [
    { id: 'A', x: 80,  y: 200, label: 'SQL',        level: 3, ev: 8  },
    { id: 'B', x: 220, y: 100, label: 'Python',     level: 2, ev: 5  },
    { id: 'C', x: 220, y: 300, label: 'Statistics', level: 2, ev: 4  },
    { id: 'D', x: 360, y: 200, label: 'ML Basics',  level: 1, ev: 2  },
    { id: 'E', x: 490, y: 120, label: 'NLP',        level: 0, ev: 0  },
    { id: 'F', x: 490, y: 280, label: 'Regression', level: 1, ev: 1  },
  ];
  const edges = [
    ['A','B'], ['A','C'], ['B','D'], ['C','D'], ['D','E'], ['D','F']
  ];
  const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));

  const radius = 28;
  const maxEv = 8;

  const levelColor = (l) => {
    if (l === 0) return T.rule;
    if (l === 1) return 'oklch(0.75 0.12 264)';
    if (l === 2) return 'oklch(0.62 0.18 264)';
    return T.indigo;
  };

  return (
    <svg viewBox="0 0 580 400" width="100%" style={{ maxWidth: 580, overflow: 'visible' }}>
      <defs>
        <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L6,3 L0,6 Z" fill={T.rule} />
        </marker>
      </defs>

      {/* edges */}
      {edges.map(([a, b], i) => {
        const na = nodeMap[a], nb = nodeMap[b];
        const dx = nb.x - na.x, dy = nb.y - na.y;
        const len = Math.sqrt(dx*dx + dy*dy);
        const ux = dx/len, uy = dy/len;
        const x1 = na.x + ux*radius, y1 = na.y + uy*radius;
        const x2 = nb.x - ux*(radius+6), y2 = nb.y - uy*(radius+6);
        return (
          <line key={i} x1={x1} y1={y1} x2={x2} y2={y2}
            stroke={T.rule} strokeWidth="1.5" markerEnd="url(#arrow)"
            className={animated ? 'edge-anim' : ''}
            style={{ animationDelay: `${i * 0.15}s` }}
          />
        );
      })}

      {/* nodes */}
      {nodes.map((n, i) => {
        const fill = levelColor(n.level);
        const textColor = n.level >= 2 ? '#fff' : T.ink2;
        const evDots = Math.min(n.ev, maxEv);
        const dotPositions = Array.from({ length: evDots }, (_, k) => {
          const angle = (k / maxEv) * 2 * Math.PI - Math.PI/2;
          return { x: n.x + Math.cos(angle) * (radius + 14), y: n.y + Math.sin(angle) * (radius + 14) };
        });
        return (
          <g key={n.id} className={animated ? 'node-anim' : ''}
            style={{ animationDelay: `${0.3 + i * 0.12}s` }}>
            <circle cx={n.x} cy={n.y} r={radius} fill={fill} />
            {n.level > 0 && (
              <circle cx={n.x} cy={n.y} r={radius} fill="none"
                stroke={T.indigo} strokeWidth="1.5" opacity="0.4" />
            )}
            <text x={n.x} y={n.y + 1} textAnchor="middle" dominantBaseline="middle"
              fontSize="10" fontWeight="500" fill={textColor} fontFamily="var(--sans)">
              {n.label}
            </text>
            {dotPositions.map((pos, k) => (
              <circle key={k} cx={pos.x} cy={pos.y} r={3.5}
                fill={T.violet} className={animated ? 'ev-dot' : ''}
                style={{ animationDelay: `${0.9 + i * 0.1 + k * 0.07}s`, opacity: animated ? 0 : 1 }}
              />
            ))}
          </g>
        );
      })}

      {/* legend */}
      <g transform="translate(20, 360)" fontFamily="var(--sans)" fontSize="10" fill={T.ink3}>
        <circle cx={8} cy={8} r={5} fill={T.violet} />
        <text x={18} y={12}>evidence item</text>
        <circle cx={80} cy={8} r={5} fill={T.indigo} />
        <text x={90} y={12}>mastered skill</text>
        <circle cx={162} cy={8} r={5} fill={T.rule} />
        <text x={172} y={12}>locked</text>
      </g>
    </svg>
  );
}

/* ── Feature illustrations ── */
function IllustrationGraph() {
  return (
    <svg viewBox="0 0 200 140" width="100%">
      {[
        [40,70,'A'],[100,30,'B'],[100,110,'C'],[160,70,'D']
      ].map(([x,y,l], i) => (
        <g key={l}>
          {i > 0 && <line x1={40} y1={70} x2={x} y2={y} stroke={T.rule} strokeWidth={1.5}/>}
          <circle cx={x} cy={y} r={22} fill={i===0?T.indigo:i===3?'oklch(0.75 0.12 264)':T.indigoLight}/>
          <text x={x} y={y+1} textAnchor="middle" dominantBaseline="middle" fontSize="9" fontWeight="500"
            fill={i===0?'#fff':T.ink2} fontFamily="var(--sans)">{l}</text>
          {[...Array(i===0?5:i===1?3:i===2?2:1)].map((_,k)=>(
            <circle key={k} cx={x + Math.cos(k/5*Math.PI*2)*32} cy={y + Math.sin(k/5*Math.PI*2)*32}
              r={3} fill={T.violet} opacity={0.8}/>
          ))}
        </g>
      ))}
    </svg>
  );
}

function IllustrationTutor() {
  return (
    <svg viewBox="0 0 200 140" width="100%">
      <rect x={10} y={10} width={120} height={120} rx={8} fill="white" stroke={T.rule} strokeWidth={1}/>
      {[20,30,40,50,60,70,80,90,100].map((y,i) => (
        <rect key={y} x={20} y={y} width={[80,60,90,70,50,85,65,75,55][i]} height={6} rx={3}
          fill={i===3?'oklch(0.88 0.07 264)':T.rule}/>
      ))}
      <rect x={10} y={52} width={120} height={18} rx={0} fill="oklch(0.88 0.07 264 / 0.4)" />
      <rect x={145} y={30} width={50} height={80} rx={8} fill={T.indigoLight} stroke={T.rule} strokeWidth={1}/>
      <text x={170} y={55} textAnchor="middle" fontSize="8" fill={T.indigo} fontWeight="600" fontFamily="var(--sans)">AI</text>
      {[70,82,94,106].map((y,i)=>(
        <rect key={y} x={152} y={y} width={[35,25,30,20][i]} height={5} rx={2.5} fill={T.rule}/>
      ))}
      <line x1={140} y1={62} x2={145} y2={62} stroke={T.indigo} strokeWidth={1.5} strokeDasharray="2,2"/>
    </svg>
  );
}

function IllustrationCredential() {
  return (
    <svg viewBox="0 0 200 140" width="100%">
      <rect x={25} y={15} width={150} height={110} rx={8} fill="white" stroke={T.rule} strokeWidth={1}/>
      <rect x={25} y={15} width={150} height={32} rx={8} fill={T.indigo}/>
      <rect x={25} y={31} width={150} height={16} fill={T.indigo}/>
      <text x={100} y={35} textAnchor="middle" fontSize="9" fill="white" fontWeight="600" fontFamily="var(--sans)">CERTIFICATE</text>
      <circle cx={100} cy={80} r={22} fill={T.indigoLight} stroke={T.indigo} strokeWidth={2}/>
      <text x={100} y={78} textAnchor="middle" fontSize="7" fill={T.indigo} fontFamily="var(--sans)">verified</text>
      <text x={100} y={88} textAnchor="middle" fontSize="14" fill={T.indigo} fontFamily="var(--serif)">✓</text>
      <rect x={40} y={110} width={120} height={6} rx={3} fill={T.rule}/>
      <rect x={60} y={120} width={80} height={5} rx={2.5} fill={T.rule}/>
    </svg>
  );
}

/* ── How it works diagrams ── */
function StepDiagram({ step }) {
  if (step === 1) return (
    <svg viewBox="0 0 120 80" width={120} height={80}>
      <rect x={10} y={20} width={100} height={40} rx={6} fill={T.indigoLight}/>
      <text x={60} y={44} textAnchor="middle" fontSize="9" fontFamily="var(--sans)" fill={T.indigo} fontWeight="500">Add a skill goal</text>
      {[0,1,2].map(i => <circle key={i} cx={30+i*30} cy={55} r={3} fill={T.indigo} opacity={0.3+i*0.3}/>)}
    </svg>
  );
  if (step === 2) return (
    <svg viewBox="0 0 120 80" width={120} height={80}>
      <rect x={5} y={5} width={70} height={70} rx={6} fill="white" stroke={T.rule} strokeWidth={1}/>
      {[15,25,35,45].map((y,i)=><rect key={y} x={12} y={y} width={[55,40,50,35][i]} height={5} rx={2.5} fill={i===1?'oklch(0.88 0.07 264)':T.rule}/>)}
      <rect x={82} y={20} width={35} height={45} rx={6} fill={T.indigoLight}/>
      <text x={99} y={42} textAnchor="middle" fontSize="7" fill={T.indigo} fontFamily="var(--sans)" fontWeight="600">AI</text>
      <text x={99} y={52} textAnchor="middle" fontSize="7" fill={T.ink2} fontFamily="var(--sans)">tutor</text>
    </svg>
  );
  return (
    <svg viewBox="0 0 120 80" width={120} height={80}>
      <rect x={20} y={10} width={80} height={60} rx={6} fill="white" stroke={T.indigo} strokeWidth={1.5}/>
      <rect x={20} y={10} width={80} height={20} rx={6} fill={T.indigo}/>
      <rect x={20} y={24} width={80} height={6} fill={T.indigo}/>
      <text x={60} y={24} textAnchor="middle" fontSize="7" fill="white" fontFamily="var(--sans)" fontWeight="600">CREDENTIAL</text>
      <circle cx={60} cy={54} r={12} fill={T.indigoLight}/>
      <text x={60} y={58} textAnchor="middle" fontSize="11" fill={T.indigo} fontFamily="var(--serif)">✓</text>
    </svg>
  );
}

/* ── Nav ── */
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <nav style={{ borderBottomColor: scrolled ? T.rule : 'transparent', transition: 'border-color 0.3s' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 2rem', display: 'flex', alignItems: 'center', height: 64, gap: '2rem' }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: '0.35rem', flex: 1 }}>
          <span style={{ fontFamily: 'var(--serif)', fontSize: '1.35rem', fontWeight: 600, color: T.ink }}>Krit</span>
          <span style={{ fontFamily: 'var(--sans)', fontSize: '0.65rem', fontWeight: 500, color: T.ink3, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 2 }}>beta</span>
        </div>
        <div style={{ display: 'flex', gap: '2rem', alignItems: 'center' }}>
          {['Product','For Teams','Pricing'].map(l => (
            <a key={l} href="#" style={{ fontFamily: 'var(--sans)', fontSize: '0.875rem', color: T.ink2, textDecoration: 'none', transition: 'color 0.18s' }}
              onMouseEnter={e=>e.target.style.color=T.ink} onMouseLeave={e=>e.target.style.color=T.ink2}>{l}</a>
          ))}
          <button className="btn-primary" style={{ padding: '0.5rem 1.25rem', fontSize: '0.875rem' }}>Get early access</button>
        </div>
      </div>
    </nav>
  );
}

/* ── Hero ── */
function Hero() {
  return (
    <section style={{ paddingTop: 120, paddingBottom: 96, maxWidth: 1200, margin: '0 auto', padding: '120px 2rem 96px' }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '5rem', alignItems: 'center' }}>
        <div>
          <div className="chip" style={{ marginBottom: '1.5rem' }}>Skill-first learning</div>
          <h1 className="serif" style={{ fontSize: 'clamp(2.25rem, 4vw, 3.5rem)', fontWeight: 400, lineHeight: 1.15, color: T.ink, marginBottom: '1.5rem', letterSpacing: '-0.01em' }}>
            Learn skills.<br/>
            Not courses.<br/>
            <em style={{ color: T.indigo }}>Show your work.</em>
          </h1>
          <p style={{ fontSize: '1.125rem', color: T.ink2, lineHeight: 1.7, marginBottom: '2.5rem', maxWidth: 420, fontWeight: 300 }}>
            Krit maps every concept into a skill graph — with AI that watches what you read and verifiable credentials that prove what you know.
          </p>
          <div style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
            <button className="btn-primary">Start learning free</button>
            <button className="btn-ghost">For L&amp;D teams →</button>
          </div>
          <p style={{ marginTop: '1.25rem', fontSize: '0.8125rem', color: T.ink3 }}>No credit card. Free access to 200+ skills.</p>
        </div>
        <div style={{ background: '#fff', border: `1px solid ${T.rule}`, borderRadius: 16, padding: '2rem', boxShadow: '0 4px 24px oklch(0.52 0.22 264 / 0.05)' }}>
          <p style={{ fontFamily: 'var(--sans)', fontSize: '0.75rem', fontWeight: 500, color: T.ink3, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '1rem' }}>Your skill graph · Data Science path</p>
          <SkillGraph animated={true} />
        </div>
      </div>
    </section>
  );
}

/* ── Features ── */
function Features() {
  const features = [
    {
      chip: 'Skill graph',
      title: 'The atomic unit is the skill, not the course.',
      body: 'Every piece of knowledge in Krit is a discrete skill with prerequisites, mastery levels, and evidence requirements. You see exactly what you know, what unlocks next, and the shortest path to your goal.',
      Illustration: IllustrationGraph,
    },
    {
      chip: 'AI tutor',
      title: 'An AI that sees exactly what you read.',
      body: 'As you read lessons, Krit\u2019s tutor observes your reading behaviour \u2014 time on page, re-reads, highlights \u2014 and surfaces the right question at the right moment. It doesn\u2019t quiz you; it notices gaps and fills them.',
      Illustration: IllustrationTutor,
    },
    {
      chip: 'Credentials',
      title: 'Verifiable proof that travels with you.',
      body: 'Every credential links back to the evidence: real work samples, quiz results, and reading logs. Share a URL on LinkedIn or your résumé. Employers can verify in one click, forever.',
      Illustration: IllustrationCredential,
    },
  ];

  const ref = useRef(null);
  useEffect(() => {
    const observer = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.12 }
    );
    ref.current?.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    return () => observer.disconnect();
  }, []);

  return (
    <section ref={ref} style={{ background: '#fff', borderTop: `1px solid ${T.rule}`, borderBottom: `1px solid ${T.rule}`, padding: '96px 2rem' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <p style={{ fontFamily: 'var(--sans)', fontSize: '0.75rem', fontWeight: 500, color: T.ink3, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '0.75rem' }}>How Krit works</p>
        <h2 className="serif reveal" style={{ fontSize: 'clamp(1.75rem, 3vw, 2.5rem)', fontWeight: 400, marginBottom: '4rem', color: T.ink }}>
          Three ideas that change how learning sticks.
        </h2>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '1.5rem' }}>
          {features.map((f, i) => (
            <div key={i} className="feature-card reveal" style={{ animationDelay: `${i*0.12}s`, transitionDelay: `${i*0.1}s` }}>
              <div style={{ marginBottom: '1.75rem', padding: '1.25rem', background: T.indigoLight, borderRadius: 8 }}>
                <f.Illustration />
              </div>
              <div className="chip" style={{ marginBottom: '1rem' }}>{f.chip}</div>
              <h3 className="serif" style={{ fontSize: '1.25rem', fontWeight: 400, lineHeight: 1.3, marginBottom: '0.875rem', color: T.ink }}>{f.title}</h3>
              <p style={{ fontSize: '0.9375rem', color: T.ink2, lineHeight: 1.75, fontWeight: 300 }}>{f.body}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ── How it works ── */
function HowItWorks() {
  const steps = [
    { num: '01', title: 'Pick a skill goal', body: 'Choose a role or skill cluster. Krit maps the prerequisite graph and shows you where you stand today.' },
    { num: '02', title: 'Learn with your AI tutor', body: 'Read curated lessons. The AI tutor tracks your comprehension in real time and surfaces exercises exactly when you need them.' },
    { num: '03', title: 'Earn a verifiable credential', body: 'Once evidence thresholds are met, Krit issues a cryptographically signed credential you can share anywhere.' },
  ];
  const ref = useRef(null);
  useEffect(() => {
    const observer = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.1 }
    );
    ref.current?.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    return () => observer.disconnect();
  }, []);
  return (
    <section ref={ref} style={{ padding: '96px 2rem' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <p style={{ fontFamily: 'var(--sans)', fontSize: '0.75rem', fontWeight: 500, color: T.ink3, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '0.75rem' }}>The process</p>

    </section>
  );
}

/* ── Pricing ── */
function Pricing() {
  const ref = useRef(null);
  useEffect(() => {
    const observer = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.1 }
    );
    ref.current?.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    return () => observer.disconnect();
  }, []);
  return (
    <section ref={ref} style={{ padding: '96px 2rem' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <p style={{ fontFamily: 'var(--sans)', fontSize: '0.75rem', fontWeight: 500, color: T.ink3, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '0.75rem' }}>Pricing</p>
        <h2 className="serif reveal" style={{ fontSize: 'clamp(1.75rem, 3vw, 2.5rem)', fontWeight: 400, marginBottom: '3rem', color: T.ink }}>
          Start free. Prove mastery when you're ready.
        </h2>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.5rem', maxWidth: 760 }}>
          {/* Retail */}
          <div className="pricing-card reveal">
            <div className="chip" style={{ marginBottom: '1.25rem' }}>For learners</div>
            <div style={{ fontFamily: 'var(--serif)', fontSize: '2rem', fontWeight: 400, color: T.ink, marginBottom: '0.25rem' }}>Free</div>
            <p style={{ fontSize: '0.875rem', color: T.ink3, marginBottom: '1.5rem' }}>+ paid certifications</p>
            <div style={{ borderTop: `1px solid ${T.rule}`, paddingTop: '1.25rem', display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
              {['Full skill graph access', 'AI tutor on every lesson', 'Personal evidence log', 'Verifiable credential: from $29'].map(f => (
                <div key={f} style={{ display: 'flex', gap: '0.75rem', alignItems: 'flex-start', fontSize: '0.875rem', color: T.ink2 }}>
                  <span style={{ color: T.indigo, marginTop: 1 }}>→</span> {f}
                </div>
              ))}
            </div>
            <button className="btn-ghost" style={{ marginTop: '1.75rem', width: '100%' }}>Start free</button>
          </div>
          {/* Corporate */}
          <div className="pricing-card featured reveal" style={{ transitionDelay: '0.1s' }}>
            <div className="chip" style={{ marginBottom: '1.25rem' }}>For L&D teams</div>
            <div style={{ fontFamily: 'var(--serif)', fontSize: '2rem', fontWeight: 400, color: T.ink, marginBottom: '0.25rem' }}>Custom</div>
            <p style={{ fontSize: '0.875rem', color: T.ink3, marginBottom: '1.5rem' }}>per seat · per year</p>
            <div style={{ borderTop: `1px solid ${T.rule}`, paddingTop: '1.25rem', display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
              {['Everything in free', 'Team skill gap dashboards', 'Custom skill paths + content', 'SSO + HRIS integration', 'Dedicated success manager'].map(f => (
                <div key={f} style={{ display: 'flex', gap: '0.75rem', alignItems: 'flex-start', fontSize: '0.875rem', color: T.ink2 }}>
                  <span style={{ color: T.indigo, marginTop: 1 }}>→</span> {f}
                </div>
              ))}
            </div>
            <button className="btn-primary" style={{ marginTop: '1.75rem', width: '100%' }}>Book a demo</button>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ── Tweaks ── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentHue": 264,
  "heroLayout": "split",
  "featureStyle": "cards"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

  const hue = (tweaks || TWEAK_DEFAULTS).accentHue;

  useEffect(() => {
    document.documentElement.style.setProperty('--indigo', `oklch(0.52 0.22 ${hue})`);
    document.documentElement.style.setProperty('--violet', `oklch(0.52 0.22 ${hue + 26})`);
    document.documentElement.style.setProperty('--indigo-light', `oklch(0.94 0.04 ${hue})`);
    document.documentElement.style.setProperty('--indigo-mid', `oklch(0.88 0.07 ${hue})`);
  }, [hue]);

  return (
    <>
      <Nav />
      <Hero />
      <Features />
      <HowItWorks />
      <SocialProof />
      <Pricing />
      <Footer />
      <window.TweaksPanel>
        <window.TweakSection label="Brand">
          <window.TweakSlider label="Accent hue" id="accentHue" min={220} max={320} step={1} value={hue} onChange={v => setTweak('accentHue', v)} />
        </window.TweakSection>
      </window.TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<div id="root"></div>
